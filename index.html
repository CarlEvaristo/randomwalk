<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Qooo. Quantum Random Experiments</title>

  <style>

    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --pink: #ff0a78;
      --pink-2: #ff3d92;
      --purple: #6d19da;
      --purple-2: #9d19ef;
      --orange: #ff7a45;
      --cyan: #31ddd2;
      --ink: #1f1338;
      --white: #fff9ff;
      --muted: rgba(255, 255, 255, 0.72);
      --glass: rgba(58, 15, 94, 0.42);
      --glass-strong: rgba(49, 13, 83, 0.68);
      --line: rgba(255, 255, 255, 0.18);
      --shadow: 0 30px 80px rgba(44, 3, 68, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html {
      min-height: 100%;
      background: #ee2a87;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 18px;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: var(--white);
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 190, 74, 0.88) 0 12%, transparent 34%),
        radial-gradient(circle at 84% 18%, rgba(44, 228, 218, 0.82) 0 10%, transparent 30%),
        radial-gradient(circle at 70% 88%, rgba(95, 33, 234, 0.9) 0 20%, transparent 43%),
        linear-gradient(145deg, #ff3f88 0%, #e8098d 35%, #8a22df 72%, #4c18c8 100%);
      background-attachment: fixed;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      border-radius: 42% 58% 66% 34% / 44% 40% 60% 56%;
      filter: saturate(120%);
      pointer-events: none;
    }

    body::before {
      width: 360px;
      height: 300px;
      top: -95px;
      right: -90px;
      background:
        radial-gradient(circle at 68% 38%, #ff0087 0 24%, transparent 25%),
        radial-gradient(circle at 30% 24%, #ff6e36 0 38%, transparent 39%),
        linear-gradient(135deg, #8825ef 0%, #ff0a7d 100%);
      transform: rotate(-10deg);
      opacity: 0.94;
    }

    body::after {
      width: 430px;
      height: 330px;
      left: -170px;
      bottom: -130px;
      background:
        radial-gradient(circle at 75% 28%, #28ddd2 0 18%, transparent 19%),
        radial-gradient(circle at 62% 70%, #641fe4 0 28%, transparent 29%),
        linear-gradient(145deg, #ff157b 0%, #3f18cc 100%);
      transform: rotate(18deg);
      opacity: 0.9;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(96vw, 940px);
      display: grid;
      gap: 18px;
      padding: 0;
    }

    .choice-screen,
    #experimentScreen {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.025)),
        linear-gradient(150deg, rgba(65, 13, 111, 0.72), rgba(147, 12, 155, 0.48));
    }

    .choice-screen::before,
    #experimentScreen::before {
      content: "";
      position: absolute;
      inset: auto -110px -130px auto;
      width: 330px;
      height: 300px;
      border-radius: 45% 55% 60% 40%;
      background:
        radial-gradient(circle at 32% 32%, #36dcd1 0 22%, transparent 23%),
        radial-gradient(circle at 63% 72%, #5325e2 0 36%, transparent 37%),
        linear-gradient(145deg, #ff0b7d, #6c20df);
      opacity: 0.72;
      transform: rotate(-12deg);
      pointer-events: none;
    }

    .choice-screen {
      min-height: 640px;
      display: grid;
      place-items: center;
      padding: clamp(28px, 5vw, 56px);
    }

    .choice-panel {
      position: relative;
      z-index: 1;
      width: min(100%, 790px);
      display: grid;
      gap: 30px;
      text-align: center;
    }

    .choice-panel > div:first-child::before {
      content: "Qooo.";
      display: inline-block;
      margin-bottom: 18px;
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: -0.06em;
      transform: rotate(-2deg);
    }

    .choice-panel h1 {
      margin: 0;
      font-size: clamp(2.35rem, 7vw, 5.2rem);
      line-height: 0.92;
      letter-spacing: -0.065em;
      text-shadow: 0 8px 30px rgba(55, 0, 86, 0.34);
    }

    .choice-panel p {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .choice-buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .choice-button {
      min-height: 200px;
      padding: 22px 18px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 9px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 24px;
      color: white;
      cursor: pointer;
      background:
        linear-gradient(145deg, rgba(255, 105, 142, 0.56), rgba(112, 20, 190, 0.62));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 18px 36px rgba(55, 1, 96, 0.28);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .choice-button:nth-child(2) {
      background: linear-gradient(145deg, rgba(50, 221, 210, 0.55), rgba(107, 24, 225, 0.65));
    }

    .choice-button:nth-child(3) {
      background: linear-gradient(145deg, rgba(255, 119, 69, 0.62), rgba(255, 8, 124, 0.58));
    }

    .choice-button:hover {
      transform: translateY(-7px) scale(1.015);
      border-color: rgba(255, 255, 255, 0.48);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.35),
        0 26px 52px rgba(55, 1, 96, 0.38);
    }

    .choice-button:active {
      transform: translateY(-2px) scale(0.995);
    }

    .choice-button strong {
      font-size: 1.08rem;
    }

    .choice-button small {
      color: rgba(255, 255, 255, 0.76);
      line-height: 1.35;
    }

    .choice-icon {
      width: 68px;
      height: 68px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 2rem;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.08));
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.35);
    }

    #choiceStatus {
      color: rgba(255, 255, 255, 0.88);
      font-size: 0.92rem;
    }

    .choice-panel > small {
      color: rgba(255, 255, 255, 0.5);
    }

    #experimentScreen {
      padding: clamp(18px, 3vw, 28px);
    }

    .toolbar {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 20px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(90deg, var(--pink), #cc18c8);
      box-shadow: 0 10px 24px rgba(95, 7, 125, 0.26);
      transition: transform 160ms ease, filter 160ms ease;
    }

    button.secondary {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.1));
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    button.menu {
      background: linear-gradient(90deg, #ff7a45, #ff2f81);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.72);
      outline-offset: 3px;
    }

    .status {
      margin-left: auto;
      padding: 9px 13px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.82);
      background: rgba(38, 10, 67, 0.34);
      font-size: 0.84rem;
    }

    canvas {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #140b25;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 24px;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.04),
        0 22px 54px rgba(34, 4, 57, 0.34);
    }

    .stats-panel {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      padding: 17px;
      display: grid;
      gap: 12px;
      background: rgba(42, 10, 73, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 22px;
    }

    .stats-panel h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 13px 10px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 15px;
      text-align: center;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.045));
    }

    .stat-label {
      display: block;
      margin-bottom: 5px;
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.72rem;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 900;
    }

    .info {
      position: relative;
      z-index: 1;
      margin-top: 13px;
      padding: 0 4px;
      display: flex;
      justify-content: space-between;
      gap: 10px 18px;
      flex-wrap: wrap;
      color: rgba(255, 255, 255, 0.62);
      font-size: 0.78rem;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .choice-screen {
        min-height: auto;
        padding: 34px 18px;
        border-radius: 28px;
      }

      .choice-buttons {
        grid-template-columns: 1fr;
      }

      .choice-button {
        min-height: 138px;
        grid-template-columns: auto 1fr;
        grid-template-areas:
          "icon title"
          "icon description";
        justify-items: start;
        text-align: left;
      }

      .choice-icon {
        grid-area: icon;
      }

      .choice-button strong {
        grid-area: title;
      }

      .choice-button small {
        grid-area: description;
      }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .status {
        width: 100%;
        margin-left: 0;
        text-align: center;
      }

      #experimentScreen {
        border-radius: 26px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }

  
    /* Full-screen, no-scroll layout */
    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      padding: clamp(8px, 1.4vw, 18px);
      display: block;
    }

    .app {
      width: 100%;
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      display: block;
    }

    .choice-screen,
    #experimentScreen {
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .choice-screen {
      display: grid;
      place-items: center;
      padding: clamp(18px, 3vw, 42px);
    }

    .choice-panel {
      width: min(100%, 1100px);
      max-height: 100%;
      gap: clamp(14px, 2.3vh, 28px);
    }

    .choice-panel h1 {
      font-size: clamp(2rem, min(6vw, 8vh), 5.4rem);
    }

    .choice-panel p {
      margin-top: 8px;
      font-size: clamp(0.82rem, 1.6vh, 1rem);
    }

    .choice-panel > div:first-child::before {
      margin-bottom: clamp(8px, 1.6vh, 16px);
      font-size: clamp(0.92rem, 1.8vh, 1.15rem);
    }

    .choice-buttons {
      gap: clamp(10px, 1.7vw, 18px);
    }

    .choice-button {
      min-height: 0;
      height: clamp(150px, 27vh, 245px);
      padding: clamp(14px, 2.2vw, 24px);
    }

    .choice-icon {
      width: clamp(52px, 7vh, 72px);
      height: clamp(52px, 7vh, 72px);
      font-size: clamp(1.45rem, 3vh, 2.1rem);
    }

    #experimentScreen {
      padding: clamp(10px, 1.5vw, 20px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      gap: clamp(8px, 1.2vh, 14px);
    }

    .toolbar {
      margin: 0;
      min-height: 0;
      gap: 8px;
    }

    .toolbar button {
      padding: clamp(8px, 1.1vh, 11px) clamp(13px, 1.6vw, 20px);
      font-size: clamp(0.78rem, 1.4vh, 1rem);
    }

    .status {
      padding: 7px 11px;
      font-size: clamp(0.7rem, 1.2vh, 0.84rem);
    }

    canvas {
      width: 100%;
      height: 100%;
      min-height: 0;
      aspect-ratio: auto;
      object-fit: contain;
      border-radius: clamp(14px, 2vw, 24px);
    }

    .stats-panel {
      margin: 0;
      padding: clamp(9px, 1.2vw, 14px);
      gap: 8px;
    }

    .stats-panel h2 {
      font-size: clamp(0.78rem, 1.35vh, 1rem);
    }

    .stats-grid {
      gap: clamp(6px, 0.8vw, 10px);
    }

    .stat {
      padding: clamp(7px, 1vh, 11px) 8px;
    }

    .stat-label {
      font-size: clamp(0.58rem, 1.05vh, 0.72rem);
      margin-bottom: 3px;
    }

    .stat-value {
      font-size: clamp(0.72rem, 1.25vh, 0.98rem);
    }

    .info {
      margin: 0;
      padding: 0 2px;
      gap: 4px 12px;
      font-size: clamp(0.58rem, 1vh, 0.76rem);
      line-height: 1.2;
    }

    @media (max-width: 760px) {
      body {
        padding: 8px;
      }

      .choice-screen {
        padding: 14px;
      }

      .choice-panel {
        gap: 12px;
      }

      .choice-panel h1 {
        font-size: clamp(1.8rem, 8vw, 3.4rem);
      }

      .choice-buttons {
        grid-template-columns: 1fr;
        min-height: 0;
        gap: 8px;
      }

      .choice-button {
        height: auto;
        min-height: 0;
        padding: 10px 13px;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto;
        grid-template-areas:
          "icon title"
          "icon description";
        column-gap: 12px;
        row-gap: 2px;
      }

      .choice-icon {
        width: 48px;
        height: 48px;
        font-size: 1.35rem;
      }

      .choice-button strong {
        font-size: 0.95rem;
      }

      .choice-button small {
        font-size: 0.72rem;
      }

      #choiceStatus,
      .choice-panel > small {
        font-size: 0.68rem;
      }

      #experimentScreen {
        padding: 8px;
        gap: 6px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }

      .toolbar button {
        width: 100%;
        padding: 8px 5px;
        font-size: 0.69rem;
      }

      .status {
        grid-column: 1 / -1;
        width: 100%;
        padding: 5px 8px;
        font-size: 0.64rem;
      }

      .stats-panel {
        padding: 7px;
        gap: 5px;
      }

      .stats-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
      }

      .stat {
        min-width: 0;
        padding: 5px 3px;
        border-radius: 10px;
      }

      .stat-label {
        font-size: 0.5rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .stat-value {
        font-size: 0.62rem;
        white-space: nowrap;
      }

      .info {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 2px 6px;
        font-size: 0.48rem;
      }

      .info span {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
    }

    @media (max-height: 720px) and (min-width: 761px) {
      .choice-panel {
        gap: 12px;
      }

      .choice-button {
        height: clamp(130px, 24vh, 180px);
      }

      .choice-panel h1 {
        font-size: clamp(2rem, 6vh, 4rem);
      }

      #experimentScreen {
        padding: 10px;
        gap: 7px;
      }

      .stats-panel {
        padding: 8px;
      }

      .stat {
        padding: 6px;
      }

      .info {
        font-size: 0.58rem;
      }
    }

    @media (orientation: landscape) and (max-height: 600px) {
      .choice-panel {
        width: min(100%, 980px);
        gap: 8px;
      }

      .choice-panel > div:first-child::before {
        margin-bottom: 4px;
      }

      .choice-panel h1 {
        font-size: clamp(1.8rem, 8vh, 3.2rem);
      }

      .choice-panel p {
        margin-top: 3px;
      }

      .choice-button {
        height: clamp(100px, 31vh, 150px);
        padding: 10px;
      }

      #choiceStatus,
      .choice-panel > small {
        font-size: 0.62rem;
      }

      #experimentScreen {
        grid-template-columns: minmax(0, 1fr) minmax(220px, 31vw);
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .toolbar {
        grid-column: 1 / -1;
      }

      canvas {
        grid-column: 1;
        grid-row: 2 / 4;
      }

      .stats-panel {
        grid-column: 2;
        grid-row: 2;
        align-self: stretch;
      }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .info {
        grid-column: 2;
        grid-row: 3;
        grid-template-columns: 1fr 1fr;
      }
    }

  
    /* Larger arena with controls and statistics beside it */
    #experimentScreen {
      grid-template-columns: minmax(0, 1fr) clamp(260px, 29vw, 360px);
      grid-template-rows: minmax(0, 1fr);
      align-items: stretch;
      gap: clamp(12px, 1.8vw, 22px);
    }

    #arena {
      grid-column: 1;
      grid-row: 1;
      width: 100% !important;
      height: 100% !important;
      align-self: stretch !important;
      justify-self: stretch !important;
      min-width: 0;
      min-height: 0;
      border-radius: 30px;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 116, 62, 0.25), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(49, 221, 210, 0.20), transparent 28%),
        radial-gradient(circle at 72% 86%, rgba(117, 35, 228, 0.34), transparent 36%),
        linear-gradient(145deg, #4c0f88 0%, #8d0f9f 42%, #d80b83 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.24),
        inset 0 0 70px rgba(37, 4, 63, 0.28),
        0 26px 70px rgba(35, 3, 61, 0.38);
    }

    .control-panel {
      grid-column: 2;
      grid-row: 1;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 26px;
      background:
        linear-gradient(160deg, rgba(255,255,255,0.13), rgba(255,255,255,0.035)),
        rgba(52, 10, 89, 0.5);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 22px 54px rgba(35, 3, 61, 0.25);
      overflow: hidden;
    }

    .control-panel .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .control-panel .toolbar button {
      width: 100%;
      min-width: 0;
    }

    .control-panel .toolbar .menu {
      grid-column: 1 / -1;
    }

    .control-panel .status {
      grid-column: 1 / -1;
      width: 100%;
      margin: 0;
      text-align: center;
      white-space: normal;
      line-height: 1.25;
    }

    .control-panel .stats-panel {
      min-height: 0;
      overflow: hidden;
      margin: 0;
      padding: 12px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.11), rgba(255,255,255,0.035)),
        rgba(34, 8, 60, 0.36);
    }

    .control-panel .stats-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-content: start;
      overflow: auto;
      scrollbar-width: thin;
    }

    .control-panel .stat {
      background:
        linear-gradient(145deg, rgba(255, 90, 145, 0.20), rgba(96, 31, 207, 0.22));
    }

    .control-panel .info {
      display: grid;
      grid-template-columns: 1fr;
      gap: 5px;
      padding: 8px 2px 0;
    }

    .control-panel .info span {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 820px) {
      #experimentScreen {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 8px;
      }

      #arena {
        grid-column: 1;
        grid-row: 1;
        border-radius: 22px;
      }

      .control-panel {
        grid-column: 1;
        grid-row: 2;
        grid-template-columns: auto minmax(0, 1fr);
        grid-template-rows: auto auto;
        gap: 7px;
        padding: 8px;
        border-radius: 20px;
      }

      .control-panel .toolbar {
        grid-column: 1;
        grid-row: 1 / 3;
        width: min(38vw, 150px);
        grid-template-columns: 1fr;
        align-content: start;
      }

      .control-panel .toolbar .menu,
      .control-panel .status {
        grid-column: 1;
      }

      .control-panel .stats-panel {
        grid-column: 2;
        grid-row: 1;
        padding: 7px;
      }

      .control-panel .stats-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
      }

      .control-panel .info {
        grid-column: 2;
        grid-row: 2;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 3px;
        padding: 0;
      }

      .control-panel .info span {
        font-size: 0.48rem;
        padding: 3px 5px;
      }
    }

    @media (orientation: landscape) and (max-height: 600px) {
      #experimentScreen {
        grid-template-columns: minmax(0, 1fr) clamp(235px, 31vw, 320px);
        grid-template-rows: minmax(0, 1fr);
      }

      #arena {
        grid-column: 1;
        grid-row: 1;
      }

      .control-panel {
        grid-column: 2;
        grid-row: 1;
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .control-panel .toolbar {
        grid-column: 1;
        grid-row: 1;
        width: auto;
        grid-template-columns: 1fr 1fr;
      }

      .control-panel .toolbar .menu,
      .control-panel .status {
        grid-column: 1 / -1;
      }

      .control-panel .stats-panel {
        grid-column: 1;
        grid-row: 2;
      }

      .control-panel .info {
        grid-column: 1;
        grid-row: 3;
        grid-template-columns: 1fr 1fr;
      }
    }

  </style>
</head>

<body>
  <main class="app">

    <section id="choiceScreen" class="choice-screen">
      <div class="choice-panel">

        <div>
          <h1>Quantum Cryptography</h1>
          <p>Choose a visualization.</p>
        </div>

        <div class="choice-buttons">
          <button id="chooseWalkButton" class="choice-button" type="button">
            <span class="choice-icon">〰️</span>
            <strong>Random Walk</strong>
            <small>Quantum-random directions</small>
          </button>

          <button id="chooseWaterfallButton" class="choice-button" type="button">
            <span class="choice-icon">🔵</span>
            <strong>Ball Waterfall</strong>
            <small>Quantum-random left/right</small>
          </button>

          <button id="chooseBrightnessButton" class="choice-button" type="button">
            <span class="choice-icon">◐</span>
            <strong>Brightness Walk</strong>
            <small>Hidden 2D walk controls brightness</small>
          </button>
        </div>

        <span id="choiceStatus">Loading quantum data…</span>
        <small>Version 1.5.3</small>

      </div>
    </section>

    <section id="experimentScreen" hidden>

      <canvas id="arena" width="720" height="720"></canvas>

      <aside class="control-panel">
        <div class="toolbar">
          <button id="startButton" type="button">Start</button>

          <button id="restartButton" class="secondary" type="button">
            Restart
          </button>

          <button id="menuButton" class="menu" type="button">
            Back to menu
          </button>

          <span id="status" class="status">
            Loading quantum data…
          </span>
        </div>

        <section class="stats-panel">
          <h2 id="statsTitle">Current Run Statistics</h2>
          <div id="statsGrid" class="stats-grid"></div>
        </section>

        <div class="info">
          <span id="modeInfo">Mode: —</span>
          <span id="bufferInfo">Buffer: 0</span>
          <span id="counterInfo">Count: 0</span>
          <span id="requestInfo">No batch yet</span>
          <span id="nextRequestInfo">Next request: —</span>
          <span>Version 1.5.3</span>
        </div>
      </aside>

    </section>

  </main>

  <script>
    "use strict";

    const VERSION = "1.5.3";

    const QRNG_URL =
      "https://qrng.anu.edu.au/API/jsonI.php" +
      "?length=1024&type=uint16";

    const SUCCESS_INTERVAL = 60_000;
    const FAILURE_INTERVAL = 90_000;
    const PREFETCH_THRESHOLD = 600;

    const RANDOM_STEPS_PER_SECOND = 10;
    const RANDOM_STEP_INTERVAL = 1000 / RANDOM_STEPS_PER_SECOND;
    const WALK_STEP_LENGTH = 10;

    const MAX_BRIGHTNESS_HISTORY = 1000;
    const INITIAL_BRIGHTNESS = 50;

    const BALL_SPAWN_INTERVAL = 700;
    const BALL_SPEED = 3.2;
    const BALL_RADIUS = 5;

    const PEG_ROWS = 11;
    const PEG_HORIZONTAL_SPACING = 48;
    const PEG_VERTICAL_SPACING = 43;
    const PEG_RADIUS = 4;

    const choiceScreen = document.getElementById("choiceScreen");
    const experimentScreen = document.getElementById("experimentScreen");

    const chooseWalkButton = document.getElementById("chooseWalkButton");
    const chooseWaterfallButton = document.getElementById("chooseWaterfallButton");
    const chooseBrightnessButton = document.getElementById("chooseBrightnessButton");

    const choiceStatus = document.getElementById("choiceStatus");
    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");
    const menuButton = document.getElementById("menuButton");
    const statusElement = document.getElementById("status");

    const modeInfo = document.getElementById("modeInfo");
    const bufferInfo = document.getElementById("bufferInfo");
    const counterInfo = document.getElementById("counterInfo");
    const requestInfo = document.getElementById("requestInfo");
    const nextRequestInfo = document.getElementById("nextRequestInfo");

    const statsTitle = document.getElementById("statsTitle");
    const statsGrid = document.getElementById("statsGrid");

    const canvas = document.getElementById("arena");
    const context = canvas.getContext("2d");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    let currentMode = null;
    let running = false;
    let wasRunningBeforeEmpty = false;

    let quantumBuffer = [];
    let localFallbackActive = false;
    let localFallbackCount = 0;

    let requestBusy = false;
    let requestTimer = null;
    let nextRequestAllowedAt = 0;
    let lastSuccessfulRequest = 0;
    let lastRequestError = null;

    let animationFrame = null;
    let previousFrameTime = 0;
    let accumulatedTime = 0;
    let ballSpawnAccumulator = 0;

    const walker = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      trail: [],
      steps: 0,

      proximitySum: {
        top: 0,
        right: 0,
        bottom: 0,
        left: 0
      },

      minimumDistance: {
        top: HEIGHT / 2,
        right: WIDTH / 2,
        bottom: HEIGHT / 2,
        left: WIDTH / 2
      }
    };

    const waterfall = {
      balls: [],
      pegs: [],
      bins: [],
      completedBalls: 0
    };

    const brightnessWalk = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      brightness: INITIAL_BRIGHTNESS,
      steps: 0,
      brightnessSum: INITIAL_BRIGHTNESS,
      minimumBrightness: INITIAL_BRIGHTNESS,
      maximumBrightness: INITIAL_BRIGHTNESS,
      history: [INITIAL_BRIGHTNESS]
    };

    function formatTime(timestamp) {
      return timestamp
        ? new Date(timestamp).toLocaleTimeString()
        : "—";
    }

    function createStat(label, value) {
      return `
        <div class="stat">
          <span class="stat-label">${label}</span>
          <span class="stat-value">${value}</span>
        </div>
      `;
    }

    function averageProximity(sum, steps) {
      return steps > 0
        ? `${(sum / steps).toFixed(2)}%`
        : "0.00%";
    }

    function percentage(part, total) {
      return total > 0
        ? `${(part / total * 100).toFixed(2)}%`
        : "0.00%";
    }

    function updateStatistics() {
      if (currentMode === "walk") {
        statsTitle.textContent =
          "Average Proximity to the Four Edges";

        statsGrid.innerHTML = [
          createStat(
            "Top edge",
            averageProximity(
              walker.proximitySum.top,
              walker.steps
            )
          ),
          createStat(
            "Right edge",
            averageProximity(
              walker.proximitySum.right,
              walker.steps
            )
          ),
          createStat(
            "Bottom edge",
            averageProximity(
              walker.proximitySum.bottom,
              walker.steps
            )
          ),
          createStat(
            "Left edge",
            averageProximity(
              walker.proximitySum.left,
              walker.steps
            )
          ),
          createStat(
            "Closest to top",
            `${walker.minimumDistance.top.toFixed(1)} px`
          ),
          createStat(
            "Closest to right",
            `${walker.minimumDistance.right.toFixed(1)} px`
          ),
          createStat(
            "Closest to bottom",
            `${walker.minimumDistance.bottom.toFixed(1)} px`
          ),
          createStat(
            "Closest to left",
            `${walker.minimumDistance.left.toFixed(1)} px`
          )
        ].join("");
      }

      if (currentMode === "brightness") {
        statsTitle.textContent =
          "Brightness During Current Run";

        const sampleCount =
          brightnessWalk.steps + 1;

        const average =
          brightnessWalk.brightnessSum /
          sampleCount;

        statsGrid.innerHTML = [
          createStat(
            "Current",
            `${brightnessWalk.brightness.toFixed(2)}%`
          ),
          createStat(
            "Average",
            `${average.toFixed(2)}%`
          ),
          createStat(
            "Minimum",
            `${brightnessWalk.minimumBrightness.toFixed(2)}%`
          ),
          createStat(
            "Maximum",
            `${brightnessWalk.maximumBrightness.toFixed(2)}%`
          ),
          createStat(
            "2D Position X",
            `${brightnessWalk.x.toFixed(1)} px`
          ),
          createStat(
            "2D Position Y",
            `${brightnessWalk.y.toFixed(1)} px`
          ),
          createStat(
            "Steps",
            brightnessWalk.steps
          ),
          createStat(
            "Starting Value",
            `${INITIAL_BRIGHTNESS}%`
          )
        ].join("");
      }

      if (currentMode === "waterfall") {
        statsTitle.textContent =
          "Ball Distribution During Current Run";

        const total =
          waterfall.completedBalls;

        const center =
          PEG_ROWS / 2;

        let leftCount = 0;
        let centerCount = 0;
        let rightCount = 0;
        let weightedSum = 0;

        waterfall.bins.forEach((count, index) => {
          weightedSum += count * index;

          if (index < Math.floor(center)) {
            leftCount += count;
          } else if (index > Math.ceil(center)) {
            rightCount += count;
          } else {
            centerCount += count;
          }
        });

        const averageBin =
          total > 0
            ? weightedSum / total
            : 0;

        statsGrid.innerHTML = [
          createStat("Total", total),
          createStat("Left", percentage(leftCount, total)),
          createStat("Center", percentage(centerCount, total)),
          createStat("Right", percentage(rightCount, total)),
          createStat("Averagee bak", averageBin.toFixed(2)),
          createStat("Number of Bins", waterfall.bins.length),
          createStat("Most Filled", Math.max(0, ...waterfall.bins)),
          createStat("Active Balls", waterfall.balls.length)
        ].join("");
      }
    }

    function updateInterface() {
      bufferInfo.textContent =
        `Buffer: ${quantumBuffer.length}`;

      if (currentMode === "walk") {
        counterInfo.textContent =
          `Steps: ${walker.steps}`;
      } else if (currentMode === "waterfall") {
        counterInfo.textContent =
          `Balls: ${waterfall.completedBalls}`;
      } else if (currentMode === "brightness") {
        counterInfo.textContent =
          `Brightness: ${brightnessWalk.brightness.toFixed(2)}%`;
      } else {
        counterInfo.textContent =
          "Count: 0";
      }

      requestInfo.textContent =
        lastSuccessfulRequest > 0
          ? `Last batch: ${formatTime(lastSuccessfulRequest)}`
          : "No batch yet";

      nextRequestInfo.textContent =
        nextRequestAllowedAt > Date.now()
          ? `Next request: ${formatTime(nextRequestAllowedAt)}`
          : "Next request: available";

      if (requestBusy) {
        choiceStatus.textContent = localFallbackActive
          ? "Local random active · fetching quantum data…"
          : "Fetching quantum data…";
      } else if (quantumBuffer.length > 0) {
        choiceStatus.textContent =
          `Quantum data ready · buffer ${quantumBuffer.length}`;
      } else if (lastRequestError || localFallbackActive) {
        choiceStatus.textContent =
          "Local JavaScript random active · QRNG retry scheduled";
      } else {
        choiceStatus.textContent =
          "Waiting for quantum data…";
      }

      updateStatistics();
    }

    function clearRequestTimer() {
      if (requestTimer !== null) {
        clearTimeout(requestTimer);
        requestTimer = null;
      }
    }

    function scheduleRequestAt(timestamp) {
      clearRequestTimer();

      const delay =
        Math.max(0, timestamp - Date.now());

      requestTimer = setTimeout(() => {
        requestTimer = null;
        requestQuantumBatch();
      }, delay);

      updateInterface();
    }

    async function requestQuantumBatch() {
      if (requestBusy) {
        return false;
      }

      const now = Date.now();

      if (now < nextRequestAllowedAt) {
        scheduleRequestAt(nextRequestAllowedAt);
        return false;
      }

      clearRequestTimer();

      requestBusy = true;
      lastRequestError = null;

      statusElement.textContent =
        "Fetching quantum data…";

      updateInterface();

      try {
        const response = await fetch(
          `${QRNG_URL}&timestamp=${Date.now()}`,
          {
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error(
            `HTTP error ${response.status}`
          );
        }

        const result =
          await response.json();

        if (
          result.success !== true ||
          !Array.isArray(result.data) ||
          result.data.length === 0
        ) {
          throw new Error(
            "Invalid QRNG response"
          );
        }

        quantumBuffer.push(...result.data);
        localFallbackActive = false;

        lastSuccessfulRequest =
          Date.now();

        nextRequestAllowedAt =
          lastSuccessfulRequest +
          SUCCESS_INTERVAL;

        statusElement.textContent =
          running
            ? "Experiment active · ANU quantum data"
            : "Quantum data ready";

        updateInterface();

        if (
          wasRunningBeforeEmpty &&
          !running &&
          currentMode !== null
        ) {
          wasRunningBeforeEmpty = false;
          startExperiment();
        }

        return true;

      } catch (error) {
        console.error(
          "QRNG request failed:",
          error
        );

        lastRequestError = error;

        nextRequestAllowedAt =
          Date.now() +
          FAILURE_INTERVAL;

        if (quantumBuffer.length === 0) {
          localFallbackActive = true;
        }

        statusElement.textContent =
          quantumBuffer.length > 0
            ? "QRNG error · existing quantum buffer active"
            : "QRNG error · local JavaScript random active";

        scheduleRequestAt(
          nextRequestAllowedAt
        );

        return false;

      } finally {
        requestBusy = false;
        updateInterface();
      }
    }

    function ensureQuantumSupply() {
      if (
        quantumBuffer.length <=
        PREFETCH_THRESHOLD
      ) {
        requestQuantumBatch();
      }
    }

    function createLocalRandomUint16() {
      if (
        window.crypto &&
        typeof window.crypto.getRandomValues === "function"
      ) {
        const values = new Uint16Array(1);
        window.crypto.getRandomValues(values);
        return values[0];
      }

      return Math.floor(Math.random() * 65536);
    }

    function takeQuantumNumber() {
      ensureQuantumSupply();

      if (quantumBuffer.length === 0) {
        localFallbackActive = true;
        localFallbackCount++;

        statusElement.textContent =
          "Experiment active · local JavaScript random";

        updateInterface();
        return createLocalRandomUint16();
      }

      const value =
        quantumBuffer.shift();

      localFallbackActive = false;
      updateInterface();
      ensureQuantumSupply();

      return value;
    }

    function showMenu() {
      running = false;
      currentMode = null;

      cancelAnimationFrame(animationFrame);

      experimentScreen.hidden = true;
      choiceScreen.hidden = false;

      startButton.textContent =
        "Start";

      updateInterface();
    }

    function showExperiment(mode) {
      currentMode = mode;

      choiceScreen.hidden = true;
      experimentScreen.hidden = false;

      if (mode === "walk") {
        modeInfo.textContent =
          "Mode: Random Walk";
      } else if (mode === "waterfall") {
        modeInfo.textContent =
          "Modus: Ball Waterfall";
      } else {
        modeInfo.textContent =
          "Modus: Brightness via 2D-walk";
      }

      resetCurrentExperiment();
    }

    function resetWalk() {
      walker.x = WIDTH / 2;
      walker.y = HEIGHT / 2;
      walker.trail = [];
      walker.steps = 0;

      walker.proximitySum = {
        top: 0,
        right: 0,
        bottom: 0,
        left: 0
      };

      walker.minimumDistance = {
        top: HEIGHT / 2,
        right: WIDTH / 2,
        bottom: HEIGHT / 2,
        left: WIDTH / 2
      };
    }

    function updateWalkStatistics() {
      const topDistance =
        walker.y;

      const rightDistance =
        WIDTH - walker.x;

      const bottomDistance =
        HEIGHT - walker.y;

      const leftDistance =
        walker.x;

      /*
        100% means the walker is on that edge.
        0% means the walker is on the opposite edge.
      */
      walker.proximitySum.top +=
        (1 - topDistance / HEIGHT) * 100;

      walker.proximitySum.right +=
        (1 - rightDistance / WIDTH) * 100;

      walker.proximitySum.bottom +=
        (1 - bottomDistance / HEIGHT) * 100;

      walker.proximitySum.left +=
        (1 - leftDistance / WIDTH) * 100;

      walker.minimumDistance.top =
        Math.min(
          walker.minimumDistance.top,
          topDistance
        );

      walker.minimumDistance.right =
        Math.min(
          walker.minimumDistance.right,
          rightDistance
        );

      walker.minimumDistance.bottom =
        Math.min(
          walker.minimumDistance.bottom,
          bottomDistance
        );

      walker.minimumDistance.left =
        Math.min(
          walker.minimumDistance.left,
          leftDistance
        );
    }

    function performWalkStep() {
      const quantumValue =
        takeQuantumNumber();

      const angle =
        quantumValue /
        65536 *
        Math.PI *
        2;

      const oldX = walker.x;
      const oldY = walker.y;

      walker.x +=
        Math.cos(angle) *
        WALK_STEP_LENGTH;

      walker.y +=
        Math.sin(angle) *
        WALK_STEP_LENGTH;

      if (walker.x < 0) {
        walker.x = -walker.x;
      }

      if (walker.x > WIDTH) {
        walker.x =
          WIDTH -
          (walker.x - WIDTH);
      }

      if (walker.y < 0) {
        walker.y = -walker.y;
      }

      if (walker.y > HEIGHT) {
        walker.y =
          HEIGHT -
          (walker.y - HEIGHT);
      }

      walker.trail.push({
        x1: oldX,
        y1: oldY,
        x2: walker.x,
        y2: walker.y
      });

      walker.steps++;

      updateWalkStatistics();
      updateInterface();
    }


    function createArenaGradient() {
      const gradient = context.createLinearGradient(0, 0, WIDTH, HEIGHT);
      gradient.addColorStop(0, "#4b128a");
      gradient.addColorStop(0.42, "#8910a1");
      gradient.addColorStop(1, "#d80b82");
      return gradient;
    }

    function drawArenaBackground() {
      context.fillStyle = createArenaGradient();
      context.fillRect(0, 0, WIDTH, HEIGHT);

      const glowOne = context.createRadialGradient(
        WIDTH * 0.16, HEIGHT * 0.12, 10,
        WIDTH * 0.16, HEIGHT * 0.12, WIDTH * 0.42
      );
      glowOne.addColorStop(0, "rgba(255,126,67,0.72)");
      glowOne.addColorStop(1, "rgba(255,126,67,0)");
      context.fillStyle = glowOne;
      context.fillRect(0, 0, WIDTH, HEIGHT);

      const glowTwo = context.createRadialGradient(
        WIDTH * 0.82, HEIGHT * 0.18, 8,
        WIDTH * 0.82, HEIGHT * 0.18, WIDTH * 0.35
      );
      glowTwo.addColorStop(0, "rgba(49,221,210,0.62)");
      glowTwo.addColorStop(1, "rgba(49,221,210,0)");
      context.fillStyle = glowTwo;
      context.fillRect(0, 0, WIDTH, HEIGHT);

      context.strokeStyle = "rgba(255,255,255,0.12)";
      context.lineWidth = 2;
      context.strokeRect(1, 1, WIDTH - 2, HEIGHT - 2);
    }

    function drawGlassPanel(x, y, width, height, radius = 18) {
      context.save();
      context.beginPath();
      context.roundRect(x, y, width, height, radius);
      context.fillStyle = "rgba(39,8,68,0.46)";
      context.fill();
      context.strokeStyle = "rgba(255,255,255,0.18)";
      context.lineWidth = 1.5;
      context.stroke();
      context.restore();
    }

    function drawWalk() {
      drawArenaBackground();

      context.lineWidth = 2.2;
      context.lineCap = "round";

      walker.trail.forEach((segment, index) => {
        const relativeAge = index / Math.max(1, walker.trail.length);
        const alpha = 0.16 + relativeAge * 0.82;

        const trailGradient = context.createLinearGradient(
          segment.x1, segment.y1, segment.x2, segment.y2
        );
        trailGradient.addColorStop(0, `rgba(49,221,210,${alpha * 0.72})`);
        trailGradient.addColorStop(1, `rgba(255,255,255,${alpha})`);

        context.strokeStyle = trailGradient;
        context.beginPath();
        context.moveTo(segment.x1, segment.y1);
        context.lineTo(segment.x2, segment.y2);
        context.stroke();
      });

      context.shadowColor = "rgba(255,126,67,0.95)";
      context.shadowBlur = 22;
      context.fillStyle = "#ffb14a";
      context.beginPath();
      context.arc(walker.x, walker.y, 7, 0, Math.PI * 2);
      context.fill();
      context.shadowBlur = 0;
    }

    function buildWaterfall() {
      waterfall.pegs = [];
      waterfall.balls = [];
      waterfall.completedBalls = 0;

      const startY = 85;

      for (let row = 0; row < PEG_ROWS; row++) {
        const pegsInRow = row + 1;

        const rowWidth =
          (pegsInRow - 1) *
          PEG_HORIZONTAL_SPACING;

        const startX =
          WIDTH / 2 -
          rowWidth / 2;

        for (
          let column = 0;
          column < pegsInRow;
          column++
        ) {
          waterfall.pegs.push({
            x:
              startX +
              column *
              PEG_HORIZONTAL_SPACING,
            y:
              startY +
              row *
              PEG_VERTICAL_SPACING
          });
        }
      }

      waterfall.bins =
        new Array(
          PEG_ROWS + 1
        ).fill(0);
    }

    function spawnBall() {
      waterfall.balls.push({
        x: WIDTH / 2,
        y: 30,
        vy: BALL_SPEED,
        row: 0,
        choices: 0
      });
    }

    function updateBall(ball) {
      ball.y += ball.vy;

      if (ball.row < PEG_ROWS) {
        const pegY =
          85 +
          ball.row *
          PEG_VERTICAL_SPACING;

        if (ball.y >= pegY) {
          const quantumValue =
            takeQuantumNumber();

          const goRight =
            quantumValue % 2 === 1;

          ball.x +=
            goRight
              ? PEG_HORIZONTAL_SPACING / 2
              : -PEG_HORIZONTAL_SPACING / 2;

          if (goRight) {
            ball.choices++;
          }

          ball.row++;
        }
      }

      const binsTop =
        85 +
        PEG_ROWS *
        PEG_VERTICAL_SPACING +
        18;

      if (ball.y >= binsTop) {
        const binIndex =
          Math.max(
            0,
            Math.min(
              waterfall.bins.length - 1,
              ball.choices
            )
          );

        waterfall.bins[binIndex]++;
        waterfall.completedBalls++;

        updateInterface();
        return false;
      }

      return true;
    }

    function updateWaterfall(elapsed) {
      ballSpawnAccumulator += elapsed;

      while (
        ballSpawnAccumulator >=
        BALL_SPAWN_INTERVAL &&
        running
      ) {
        spawnBall();

        ballSpawnAccumulator -=
          BALL_SPAWN_INTERVAL;
      }

      waterfall.balls =
        waterfall.balls.filter(updateBall);
    }

    function drawWaterfall() {
      drawArenaBackground();

      context.shadowColor = "rgba(49,221,210,0.55)";
      context.shadowBlur = 10;
      context.fillStyle = "rgba(255,255,255,0.84)";

      waterfall.pegs.forEach(peg => {
        context.beginPath();
        context.arc(peg.x, peg.y, PEG_RADIUS + 0.7, 0, Math.PI * 2);
        context.fill();
      });

      context.shadowColor = "rgba(255,104,60,0.9)";
      context.shadowBlur = 18;
      context.fillStyle = "#ff9b49";

      waterfall.balls.forEach(ball => {
        context.beginPath();
        context.arc(ball.x, ball.y, BALL_RADIUS + 1, 0, Math.PI * 2);
        context.fill();
      });
      context.shadowBlur = 0;

      const binsTop = 85 + PEG_ROWS * PEG_VERTICAL_SPACING + 18;
      const binWidth = WIDTH / waterfall.bins.length;
      const maximum = Math.max(1, ...waterfall.bins);

      context.font = "600 13px system-ui";
      context.textAlign = "center";

      waterfall.bins.forEach((count, index) => {
        const x = index * binWidth;
        const maximumBarHeight = HEIGHT - binsTop - 42;
        const barHeight = count / maximum * maximumBarHeight;

        context.fillStyle = "rgba(31,7,55,0.35)";
        context.fillRect(x + 2, binsTop, binWidth - 4, HEIGHT - binsTop - 30);

        const barGradient = context.createLinearGradient(0, HEIGHT - 32, 0, HEIGHT - 32 - barHeight);
        barGradient.addColorStop(0, "rgba(255,22,123,0.92)");
        barGradient.addColorStop(1, "rgba(49,221,210,0.92)");
        context.fillStyle = barGradient;
        context.fillRect(x + 4, HEIGHT - 32 - barHeight, binWidth - 8, barHeight);

        context.strokeStyle = "rgba(255,255,255,0.16)";
        context.strokeRect(x + 2, binsTop, binWidth - 4, HEIGHT - binsTop - 30);

        context.fillStyle = "rgba(255,255,255,0.92)";
        context.fillText(String(count), x + binWidth / 2, HEIGHT - 10);
      });
    }

    function resetBrightnessWalk() {
      brightnessWalk.x = WIDTH / 2;
      brightnessWalk.y = HEIGHT / 2;
      brightnessWalk.brightness = INITIAL_BRIGHTNESS;
      brightnessWalk.steps = 0;
      brightnessWalk.brightnessSum = INITIAL_BRIGHTNESS;
      brightnessWalk.minimumBrightness = INITIAL_BRIGHTNESS;
      brightnessWalk.maximumBrightness = INITIAL_BRIGHTNESS;
      brightnessWalk.history = [INITIAL_BRIGHTNESS];
    }

    function performBrightnessStep() {
      const quantumValue =
        takeQuantumNumber();

      const angle =
        quantumValue /
        65536 *
        Math.PI *
        2;

      brightnessWalk.x +=
        Math.cos(angle) *
        WALK_STEP_LENGTH;

      brightnessWalk.y +=
        Math.sin(angle) *
        WALK_STEP_LENGTH;

      if (brightnessWalk.x < 0) {
        brightnessWalk.x =
          -brightnessWalk.x;
      }

      if (brightnessWalk.x > WIDTH) {
        brightnessWalk.x =
          WIDTH -
          (brightnessWalk.x - WIDTH);
      }

      if (brightnessWalk.y < 0) {
        brightnessWalk.y =
          -brightnessWalk.y;
      }

      if (brightnessWalk.y > HEIGHT) {
        brightnessWalk.y =
          HEIGHT -
          (brightnessWalk.y - HEIGHT);
      }

      brightnessWalk.brightness =
        100 -
        (
          brightnessWalk.y /
          HEIGHT *
          100
        );

      brightnessWalk.steps++;

      brightnessWalk.brightnessSum +=
        brightnessWalk.brightness;

      brightnessWalk.minimumBrightness =
        Math.min(
          brightnessWalk.minimumBrightness,
          brightnessWalk.brightness
        );

      brightnessWalk.maximumBrightness =
        Math.max(
          brightnessWalk.maximumBrightness,
          brightnessWalk.brightness
        );

      brightnessWalk.history.push(
        brightnessWalk.brightness
      );

      if (
        brightnessWalk.history.length >
        MAX_BRIGHTNESS_HISTORY
      ) {
        brightnessWalk.history.shift();
      }

      updateInterface();
    }

    function drawBrightnessWalk() {
      const greyValue = Math.round(brightnessWalk.brightness / 100 * 255);

      drawArenaBackground();

      const brightnessOverlay = context.createLinearGradient(0, HEIGHT, WIDTH, 0);
      brightnessOverlay.addColorStop(
        0,
        `rgba(${greyValue},${greyValue},${greyValue},0.72)`
      );
      brightnessOverlay.addColorStop(
        1,
        `rgba(${greyValue},${greyValue},${greyValue},0.28)`
      );
      context.fillStyle = brightnessOverlay;
      context.fillRect(0, 0, WIDTH, HEIGHT);

      drawBrightnessGraph(greyValue);
      drawBrightnessRunAverage(greyValue);
    }

    function drawBrightnessRunAverage(backgroundGrey) {
      const sampleCount =
        brightnessWalk.steps + 1;

      const runningAverage =
        brightnessWalk.brightnessSum /
        sampleCount;

      const foreground =
        backgroundGrey > 128
          ? "#111111"
          : "#ffffff";

      const panelBackground =
        backgroundGrey > 128
          ? "rgba(255,255,255,0.72)"
          : "rgba(0,0,0,0.62)";

      const panelWidth = 226;
      const panelHeight = 58;
      const panelX = WIDTH - panelWidth - 28;
      const panelY = 28;

      drawGlassPanel(panelX, panelY, panelWidth, panelHeight, 16);

      context.fillStyle = foreground;
      context.textAlign = "right";
      context.font = "12px system-ui";
      context.fillText(
        "RUNNING AVERAGE",
        panelX + panelWidth - 12,
        panelY + 18
      );

      context.font = "bold 25px system-ui";
      context.fillText(
        `${runningAverage.toFixed(2)}%`,
        panelX + panelWidth - 12,
        panelY + 47
      );
    }

    function drawBrightnessGraph(backgroundGrey) {
      const graphX = 28;
      const graphY = 28;
      const graphWidth = 280;
      const graphHeight = 150;

      const graphBackground =
        backgroundGrey > 128
          ? "rgba(0,0,0,0.78)"
          : "rgba(255,255,255,0.14)";

      const graphForeground =
        backgroundGrey > 128
          ? "#ffffff"
          : "#f0f6fc";

      drawGlassPanel(graphX, graphY, graphWidth, graphHeight, 18);

      context.strokeStyle =
        "rgba(180,180,180,0.3)";

      for (
        let value = 0;
        value <= 100;
        value += 25
      ) {
        const y =
          graphY +
          graphHeight -
          value /
          100 *
          graphHeight;

        context.beginPath();
        context.moveTo(graphX, y);
        context.lineTo(graphX + graphWidth, y);
        context.stroke();
      }

      context.fillStyle = graphForeground;
      context.font = "12px system-ui";
      context.textAlign = "left";

      context.fillText("100", graphX + 5, graphY + 13);
      context.fillText(
        "50",
        graphX + 5,
        graphY + graphHeight / 2 + 4
      );
      context.fillText(
        "0",
        graphX + 5,
        graphY + graphHeight - 5
      );

      context.fillText(
        `${brightnessWalk.brightness.toFixed(2)}%`,
        graphX + graphWidth - 55,
        graphY + 16
      );

      const history =
        brightnessWalk.history;

      if (history.length < 2) {
        return;
      }

      context.strokeStyle = graphForeground;
      context.lineWidth = 2;
      context.beginPath();

      history.forEach((value, index) => {
        const x =
          graphX +
          index /
          Math.max(1, history.length - 1) *
          graphWidth;

        const y =
          graphY +
          graphHeight -
          value /
          100 *
          graphHeight;

        if (index === 0) {
          context.moveTo(x, y);
        } else {
          context.lineTo(x, y);
        }
      });

      context.stroke();
    }

    function drawCurrentMode() {
      if (currentMode === "walk") {
        drawWalk();
      } else if (currentMode === "waterfall") {
        drawWaterfall();
      } else if (currentMode === "brightness") {
        drawBrightnessWalk();
      }
    }

    function animationLoop(timestamp) {
      if (!running) {
        return;
      }

      if (previousFrameTime === 0) {
        previousFrameTime = timestamp;
      }

      const elapsed =
        Math.min(
          100,
          timestamp - previousFrameTime
        );

      previousFrameTime = timestamp;

      if (
        currentMode === "walk" ||
        currentMode === "brightness"
      ) {
        accumulatedTime += elapsed;

        while (
          accumulatedTime >=
          RANDOM_STEP_INTERVAL &&
          running
        ) {
          if (currentMode === "walk") {
            performWalkStep();
          } else {
            performBrightnessStep();
          }

          accumulatedTime -=
            RANDOM_STEP_INTERVAL;
        }
      } else if (
        currentMode === "waterfall"
      ) {
        updateWaterfall(elapsed);
      }

      drawCurrentMode();

      if (running) {
        animationFrame =
          requestAnimationFrame(
            animationLoop
          );
      }
    }

    function resetCurrentExperiment() {
      running = false;
      wasRunningBeforeEmpty = false;

      cancelAnimationFrame(animationFrame);

      previousFrameTime = 0;
      accumulatedTime = 0;
      ballSpawnAccumulator = 0;

      startButton.textContent = "Start";

      if (currentMode === "walk") {
        resetWalk();
      } else if (currentMode === "waterfall") {
        buildWaterfall();
      } else if (currentMode === "brightness") {
        resetBrightnessWalk();
      }

      statusElement.textContent =
        quantumBuffer.length > 0
          ? "Quantum data ready"
          : "Quantumdata laden · lokale fallback available";

      updateInterface();
      drawCurrentMode();
      fitCanvasToAvailableSpace();
      ensureQuantumSupply();
    }

    async function startExperiment() {
      if (
        running ||
        currentMode === null
      ) {
        return;
      }

      if (quantumBuffer.length === 0) {
        requestQuantumBatch();
        localFallbackActive = true;
      }

      running = true;
      wasRunningBeforeEmpty = false;

      startButton.textContent = "Pause";
      statusElement.textContent =
        quantumBuffer.length > 0
          ? "Experiment active · ANU quantum data"
          : "Experiment active · local JavaScript random";

      previousFrameTime = 0;

      animationFrame =
        requestAnimationFrame(
          animationLoop
        );
    }

    chooseWalkButton.addEventListener(
      "click",
      () => showExperiment("walk")
    );

    chooseWaterfallButton.addEventListener(
      "click",
      () => showExperiment("waterfall")
    );

    chooseBrightnessButton.addEventListener(
      "click",
      () => showExperiment("brightness")
    );

    startButton.addEventListener(
      "click",
      async () => {
        if (running) {
          running = false;
          wasRunningBeforeEmpty = false;

          cancelAnimationFrame(animationFrame);

          startButton.textContent = "Start";
          statusElement.textContent = "Paused";
          return;
        }

        await startExperiment();
      }
    );

    restartButton.addEventListener(
      "click",
      async () => {
        resetCurrentExperiment();
        await startExperiment();
      }
    );

    menuButton.addEventListener(
      "click",
      showMenu
    );

    setInterval(
      ensureQuantumSupply,
      5_000
    );

    setInterval(
      updateInterface,
      1_000
    );


    function fitCanvasToAvailableSpace() {
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      canvas.style.justifySelf = "stretch";
      canvas.style.alignSelf = "stretch";
    }

    window.addEventListener("resize", fitCanvasToAvailableSpace);
    window.addEventListener("orientationchange", () => {
      setTimeout(fitCanvasToAvailableSpace, 100);
    });

    async function initialize() {
      showMenu();

      resetWalk();
      buildWaterfall();
      resetBrightnessWalk();

      updateInterface();

      fitCanvasToAvailableSpace();
      await requestQuantumBatch();
    }

    window.addEventListener(
      "DOMContentLoaded",
      initialize
    );
  </script>
</body>
</html>
