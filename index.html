<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Quantum Random Experiments</title>

  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d1117;
      color: #f0f6fc;
    }

    .app {
      width: min(94vw, 820px);
      display: grid;
      gap: 14px;
    }

    .choice-screen {
      min-height: 620px;
      display: grid;
      place-items: center;
      padding: 30px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
    }

    .choice-panel {
      width: min(100%, 740px);
      display: grid;
      gap: 24px;
      text-align: center;
    }

    .choice-panel h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 3rem);
    }

    .choice-panel p {
      margin: 8px 0 0;
      color: #8b949e;
    }

    .choice-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .choice-button {
      min-height: 170px;
      padding: 20px;
      display: grid;
      place-items: center;
      gap: 8px;
      background: #21262d;
      border: 1px solid #484f58;
      border-radius: 14px;
      color: #f0f6fc;
      cursor: pointer;
      font-size: 1rem;
    }

    .choice-button:hover {
      background: #30363d;
      border-color: #58a6ff;
    }

    .choice-icon {
      font-size: 2.5rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      color: white;
      background: #238636;
    }

    button.secondary {
      background: #30363d;
    }

    button.menu {
      background: #8b2c2c;
    }

    button:hover {
      filter: brightness(1.12);
    }

    .status {
      margin-left: auto;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #010409;
      border: 1px solid #484f58;
      border-radius: 12px;
    }

    .info {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      opacity: 0.76;
    }

    @media (max-width: 760px) {
      .choice-buttons {
        grid-template-columns: 1fr;
      }

      .status {
        width: 100%;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <main class="app">

    <section id="choiceScreen" class="choice-screen">
      <div class="choice-panel">

        <div>
          <h1>Quantum-experiment</h1>
          <p>Kies een visualisatie.</p>
        </div>

        <div class="choice-buttons">

          <button
            id="chooseWalkButton"
            class="choice-button"
            type="button"
          >
            <span class="choice-icon">〰️</span>
            <strong>Random Walk</strong>
            <small>Quantum-random richtingen</small>
          </button>

          <button
            id="chooseWaterfallButton"
            class="choice-button"
            type="button"
          >
            <span class="choice-icon">🔵</span>
            <strong>Knikkerwaterval</strong>
            <small>Quantum-random links/rechts</small>
          </button>

          <button
            id="chooseBrightnessButton"
            class="choice-button"
            type="button"
          >
            <span class="choice-icon">◐</span>
            <strong>Lichtsterkte-walk</strong>
            <small>Verborgen 2D-walk bepaalt grijstint</small>
          </button>

        </div>

        <span id="choiceStatus">
          Quantumdata laden…
        </span>

        <small>
          Versie 1.4.2 · deploy 2026-07-11
        </small>

      </div>
    </section>

    <section id="experimentScreen" hidden>

      <div class="toolbar">

        <button id="startButton" type="button">
          Start
        </button>

        <button
          id="restartButton"
          class="secondary"
          type="button"
        >
          Herstart
        </button>

        <button
          id="menuButton"
          class="menu"
          type="button"
        >
          Terug naar menu
        </button>

        <span id="status" class="status">
          Quantumdata laden…
        </span>

      </div>

      <canvas
        id="arena"
        width="720"
        height="720"
      ></canvas>

      <div class="info">
        <span id="modeInfo">Modus: —</span>
        <span id="bufferInfo">Buffer: 0</span>
        <span id="counterInfo">Aantal: 0</span>
        <span id="requestInfo">Nog geen batch</span>
        <span id="nextRequestInfo">Volgende request: —</span>
        <span>Versie 1.4.2</span>
      </div>

    </section>

  </main>

  <script>
    "use strict";

    const VERSION = "1.4.2";

    const QRNG_URL =
      "https://qrng.anu.edu.au/API/jsonI.php" +
      "?length=1024&type=uint16";

    const SUCCESS_INTERVAL = 60_000;
    const FAILURE_INTERVAL = 90_000;
    const PREFETCH_THRESHOLD = 600;

    const RANDOM_STEPS_PER_SECOND = 10;
    const RANDOM_STEP_INTERVAL =
      1000 / RANDOM_STEPS_PER_SECOND;

    const WALK_STEP_LENGTH = 10;

    const MAX_BRIGHTNESS_HISTORY = 1000;
    const INITIAL_BRIGHTNESS = 25;

    const BALL_SPAWN_INTERVAL = 700;
    const BALL_SPEED = 3.2;
    const BALL_RADIUS = 5;

    const PEG_ROWS = 11;
    const PEG_HORIZONTAL_SPACING = 48;
    const PEG_VERTICAL_SPACING = 43;
    const PEG_RADIUS = 4;

    const choiceScreen =
      document.getElementById("choiceScreen");

    const experimentScreen =
      document.getElementById("experimentScreen");

    const chooseWalkButton =
      document.getElementById("chooseWalkButton");

    const chooseWaterfallButton =
      document.getElementById("chooseWaterfallButton");

    const chooseBrightnessButton =
      document.getElementById("chooseBrightnessButton");

    const choiceStatus =
      document.getElementById("choiceStatus");

    const startButton =
      document.getElementById("startButton");

    const restartButton =
      document.getElementById("restartButton");

    const menuButton =
      document.getElementById("menuButton");

    const statusElement =
      document.getElementById("status");

    const modeInfo =
      document.getElementById("modeInfo");

    const bufferInfo =
      document.getElementById("bufferInfo");

    const counterInfo =
      document.getElementById("counterInfo");

    const requestInfo =
      document.getElementById("requestInfo");

    const nextRequestInfo =
      document.getElementById("nextRequestInfo");

    const canvas =
      document.getElementById("arena");

    const context =
      canvas.getContext("2d");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    let currentMode = null;
    let running = false;
    let wasRunningBeforeEmpty = false;

    let quantumBuffer = [];

    let requestBusy = false;
    let requestTimer = null;
    let nextRequestAllowedAt = 0;
    let lastSuccessfulRequest = 0;
    let lastRequestError = null;

    let animationFrame = null;
    let previousFrameTime = 0;
    let accumulatedTime = 0;
    let ballSpawnAccumulator = 0;

    const walker = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      trail: [],
      steps: 0
    };

    const waterfall = {
      balls: [],
      pegs: [],
      bins: [],
      completedBalls: 0
    };

    const brightnessWalk = {
      x: WIDTH / 2,
      y: HEIGHT * 0.75,
      brightness: INITIAL_BRIGHTNESS,
      steps: 0,
      history: [INITIAL_BRIGHTNESS]
    };

    function formatTime(timestamp) {
      if (!timestamp) {
        return "—";
      }

      return new Date(timestamp).toLocaleTimeString();
    }

    function updateInterface() {
      bufferInfo.textContent =
        `Buffer: ${quantumBuffer.length}`;

      if (currentMode === "walk") {
        counterInfo.textContent =
          `Stappen: ${walker.steps}`;
      } else if (currentMode === "waterfall") {
        counterInfo.textContent =
          `Knikkers: ${waterfall.completedBalls}`;
      } else if (currentMode === "brightness") {
        counterInfo.textContent =
          `Lichtsterkte: ${brightnessWalk.brightness.toFixed(2)}%`;
      } else {
        counterInfo.textContent =
          "Aantal: 0";
      }

      requestInfo.textContent =
        lastSuccessfulRequest > 0
          ? `Laatste batch: ${formatTime(lastSuccessfulRequest)}`
          : "Nog geen batch";

      nextRequestInfo.textContent =
        nextRequestAllowedAt > Date.now()
          ? `Volgende request: ${formatTime(nextRequestAllowedAt)}`
          : "Volgende request: beschikbaar";

      if (requestBusy) {
        choiceStatus.textContent =
          "Quantumdata ophalen…";
      } else if (quantumBuffer.length > 0) {
        choiceStatus.textContent =
          `Quantumdata gereed · buffer ${quantumBuffer.length}`;
      } else if (lastRequestError) {
        choiceStatus.textContent =
          "QRNG-fout · retry gepland";
      } else {
        choiceStatus.textContent =
          "Wachten op quantumdata…";
      }
    }

    function clearRequestTimer() {
      if (requestTimer !== null) {
        clearTimeout(requestTimer);
        requestTimer = null;
      }
    }

    function scheduleRequestAt(timestamp) {
      clearRequestTimer();

      const delay =
        Math.max(
          0,
          timestamp - Date.now()
        );

      requestTimer = setTimeout(() => {
        requestTimer = null;
        requestQuantumBatch();
      }, delay);

      updateInterface();
    }

    async function requestQuantumBatch() {
      if (requestBusy) {
        return false;
      }

      const now = Date.now();

      if (now < nextRequestAllowedAt) {
        scheduleRequestAt(nextRequestAllowedAt);
        return false;
      }

      clearRequestTimer();

      requestBusy = true;
      lastRequestError = null;

      statusElement.textContent =
        "Quantumdata ophalen…";

      updateInterface();

      try {
        const response = await fetch(
          `${QRNG_URL}&timestamp=${Date.now()}`,
          {
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error(
            `HTTP-fout ${response.status}`
          );
        }

        const result =
          await response.json();

        if (
          result.success !== true ||
          !Array.isArray(result.data) ||
          result.data.length === 0
        ) {
          throw new Error(
            "Ongeldig QRNG-antwoord"
          );
        }

        quantumBuffer.push(...result.data);

        lastSuccessfulRequest =
          Date.now();

        nextRequestAllowedAt =
          lastSuccessfulRequest +
          SUCCESS_INTERVAL;

        statusElement.textContent =
          running
            ? "Experiment actief"
            : "Quantumdata gereed";

        updateInterface();

        if (
          wasRunningBeforeEmpty &&
          !running &&
          currentMode !== null
        ) {
          wasRunningBeforeEmpty = false;
          startExperiment();
        }

        return true;

      } catch (error) {
        console.error(
          "QRNG-request mislukt:",
          error
        );

        lastRequestError = error;

        nextRequestAllowedAt =
          Date.now() +
          FAILURE_INTERVAL;

        statusElement.textContent =
          quantumBuffer.length > 0
            ? "QRNG-fout · bestaande buffer actief"
            : "QRNG-fout · retry gepland";

        scheduleRequestAt(
          nextRequestAllowedAt
        );

        return false;

      } finally {
        requestBusy = false;
        updateInterface();
      }
    }

    function ensureQuantumSupply() {
      if (
        quantumBuffer.length >
        PREFETCH_THRESHOLD
      ) {
        return;
      }

      requestQuantumBatch();
    }

    function takeQuantumNumber() {
      ensureQuantumSupply();

      if (quantumBuffer.length === 0) {
        return null;
      }

      const value =
        quantumBuffer.shift();

      updateInterface();
      ensureQuantumSupply();

      return value;
    }

    function stopForEmptyBuffer() {
      wasRunningBeforeEmpty = running;
      running = false;

      cancelAnimationFrame(
        animationFrame
      );

      startButton.textContent =
        "Start";

      statusElement.textContent =
        "Buffer leeg · wachten op quantumdata…";

      ensureQuantumSupply();
    }

    function showMenu() {
      running = false;
      currentMode = null;

      cancelAnimationFrame(
        animationFrame
      );

      experimentScreen.hidden = true;
      choiceScreen.hidden = false;

      startButton.textContent =
        "Start";

      updateInterface();
    }

    function showExperiment(mode) {
      currentMode = mode;

      choiceScreen.hidden = true;
      experimentScreen.hidden = false;

      if (mode === "walk") {
        modeInfo.textContent =
          "Modus: Random Walk";
      } else if (mode === "waterfall") {
        modeInfo.textContent =
          "Modus: Knikkerwaterval";
      } else {
        modeInfo.textContent =
          "Modus: Lichtsterkte via 2D-walk";
      }

      resetCurrentExperiment();
    }

    function resetWalk() {
      walker.x = WIDTH / 2;
      walker.y = HEIGHT / 2;
      walker.trail = [];
      walker.steps = 0;
    }

    function performWalkStep() {
      const quantumValue =
        takeQuantumNumber();

      if (quantumValue === null) {
        stopForEmptyBuffer();
        return;
      }

      const angle =
        quantumValue /
        65536 *
        Math.PI *
        2;

      const oldX = walker.x;
      const oldY = walker.y;

      walker.x +=
        Math.cos(angle) *
        WALK_STEP_LENGTH;

      walker.y +=
        Math.sin(angle) *
        WALK_STEP_LENGTH;

      if (walker.x < 0) {
        walker.x = -walker.x;
      }

      if (walker.x > WIDTH) {
        walker.x =
          WIDTH -
          (walker.x - WIDTH);
      }

      if (walker.y < 0) {
        walker.y = -walker.y;
      }

      if (walker.y > HEIGHT) {
        walker.y =
          HEIGHT -
          (walker.y - HEIGHT);
      }

      walker.trail.push({
        x1: oldX,
        y1: oldY,
        x2: walker.x,
        y2: walker.y
      });

      walker.steps++;
      updateInterface();
    }

    function drawWalk() {
      context.fillStyle =
        "#010409";

      context.fillRect(
        0,
        0,
        WIDTH,
        HEIGHT
      );

      context.lineWidth = 1.5;
      context.lineCap = "round";

      for (
        let index = 0;
        index < walker.trail.length;
        index++
      ) {
        const segment =
          walker.trail[index];

        const relativeAge =
          index /
          Math.max(
            1,
            walker.trail.length
          );

        const alpha =
          0.2 +
          relativeAge *
          0.75;

        context.strokeStyle =
          `rgba(88,166,255,${alpha})`;

        context.beginPath();

        context.moveTo(
          segment.x1,
          segment.y1
        );

        context.lineTo(
          segment.x2,
          segment.y2
        );

        context.stroke();
      }

      context.fillStyle =
        "#f2cc60";

      context.beginPath();

      context.arc(
        walker.x,
        walker.y,
        4.5,
        0,
        Math.PI * 2
      );

      context.fill();
    }

    function buildWaterfall() {
      waterfall.pegs = [];
      waterfall.balls = [];
      waterfall.completedBalls = 0;

      const startY = 85;

      for (
        let row = 0;
        row < PEG_ROWS;
        row++
      ) {
        const pegsInRow =
          row + 1;

        const rowWidth =
          (pegsInRow - 1) *
          PEG_HORIZONTAL_SPACING;

        const startX =
          WIDTH / 2 -
          rowWidth / 2;

        for (
          let column = 0;
          column < pegsInRow;
          column++
        ) {
          waterfall.pegs.push({
            x:
              startX +
              column *
              PEG_HORIZONTAL_SPACING,
            y:
              startY +
              row *
              PEG_VERTICAL_SPACING
          });
        }
      }

      waterfall.bins =
        new Array(
          PEG_ROWS + 1
        ).fill(0);
    }

    function spawnBall() {
      waterfall.balls.push({
        x: WIDTH / 2,
        y: 30,
        vy: BALL_SPEED,
        row: 0,
        choices: 0
      });
    }

    function updateBall(ball) {
      ball.y += ball.vy;

      if (ball.row < PEG_ROWS) {
        const pegY =
          85 +
          ball.row *
          PEG_VERTICAL_SPACING;

        if (ball.y >= pegY) {
          const quantumValue =
            takeQuantumNumber();

          if (quantumValue === null) {
            stopForEmptyBuffer();
            return true;
          }

          const goRight =
            quantumValue % 2 === 1;

          ball.x +=
            goRight
              ? PEG_HORIZONTAL_SPACING / 2
              : -PEG_HORIZONTAL_SPACING / 2;

          if (goRight) {
            ball.choices++;
          }

          ball.row++;
        }
      }

      const binsTop =
        85 +
        PEG_ROWS *
        PEG_VERTICAL_SPACING +
        18;

      if (ball.y >= binsTop) {
        const binIndex =
          Math.max(
            0,
            Math.min(
              waterfall.bins.length - 1,
              ball.choices
            )
          );

        waterfall.bins[binIndex]++;
        waterfall.completedBalls++;

        updateInterface();
        return false;
      }

      return true;
    }

    function updateWaterfall(elapsed) {
      ballSpawnAccumulator += elapsed;

      while (
        ballSpawnAccumulator >=
        BALL_SPAWN_INTERVAL &&
        running
      ) {
        spawnBall();

        ballSpawnAccumulator -=
          BALL_SPAWN_INTERVAL;
      }

      waterfall.balls =
        waterfall.balls.filter(
          updateBall
        );
    }

    function drawWaterfall() {
      context.fillStyle =
        "#010409";

      context.fillRect(
        0,
        0,
        WIDTH,
        HEIGHT
      );

      context.fillStyle =
        "#8b949e";

      for (
        const peg of waterfall.pegs
      ) {
        context.beginPath();

        context.arc(
          peg.x,
          peg.y,
          PEG_RADIUS,
          0,
          Math.PI * 2
        );

        context.fill();
      }

      context.fillStyle =
        "#58a6ff";

      for (
        const ball of waterfall.balls
      ) {
        context.beginPath();

        context.arc(
          ball.x,
          ball.y,
          BALL_RADIUS,
          0,
          Math.PI * 2
        );

        context.fill();
      }

      const binsTop =
        85 +
        PEG_ROWS *
        PEG_VERTICAL_SPACING +
        18;

      const binWidth =
        WIDTH /
        waterfall.bins.length;

      const maximum =
        Math.max(
          1,
          ...waterfall.bins
        );

      context.font =
        "13px system-ui";

      context.textAlign =
        "center";

      for (
        let index = 0;
        index < waterfall.bins.length;
        index++
      ) {
        const count =
          waterfall.bins[index];

        const x =
          index * binWidth;

        const maximumBarHeight =
          HEIGHT -
          binsTop -
          42;

        const barHeight =
          count /
          maximum *
          maximumBarHeight;

        context.strokeStyle =
          "#484f58";

        context.strokeRect(
          x,
          binsTop,
          binWidth,
          HEIGHT - binsTop - 30
        );

        context.fillStyle =
          "rgba(88,166,255,0.6)";

        context.fillRect(
          x + 2,
          HEIGHT - 32 - barHeight,
          binWidth - 4,
          barHeight
        );

        context.fillStyle =
          "#f0f6fc";

        context.fillText(
          String(count),
          x + binWidth / 2,
          HEIGHT - 10
        );
      }
    }

    function resetBrightnessWalk() {
      brightnessWalk.x =
        WIDTH / 2;

      /*
        25% lichtsterkte betekent dat de verborgen
        walker op 75% van de veldhoogte begint.
      */
      brightnessWalk.y =
        HEIGHT * 0.75;

      brightnessWalk.brightness =
        INITIAL_BRIGHTNESS;

      brightnessWalk.steps = 0;

      brightnessWalk.history = [
        INITIAL_BRIGHTNESS
      ];
    }

    function performBrightnessStep() {
      const quantumValue =
        takeQuantumNumber();

      if (quantumValue === null) {
        stopForEmptyBuffer();
        return;
      }

      const angle =
        quantumValue /
        65536 *
        Math.PI *
        2;

      brightnessWalk.x +=
        Math.cos(angle) *
        WALK_STEP_LENGTH;

      brightnessWalk.y +=
        Math.sin(angle) *
        WALK_STEP_LENGTH;

      if (brightnessWalk.x < 0) {
        brightnessWalk.x =
          -brightnessWalk.x;
      }

      if (brightnessWalk.x > WIDTH) {
        brightnessWalk.x =
          WIDTH -
          (
            brightnessWalk.x -
            WIDTH
          );
      }

      if (brightnessWalk.y < 0) {
        brightnessWalk.y =
          -brightnessWalk.y;
      }

      if (brightnessWalk.y > HEIGHT) {
        brightnessWalk.y =
          HEIGHT -
          (
            brightnessWalk.y -
            HEIGHT
          );
      }

      brightnessWalk.brightness =
        100 -
        (
          brightnessWalk.y /
          HEIGHT *
          100
        );

      brightnessWalk.steps++;

      brightnessWalk.history.push(
        brightnessWalk.brightness
      );

      if (
        brightnessWalk.history.length >
        MAX_BRIGHTNESS_HISTORY
      ) {
        brightnessWalk.history.shift();
      }

      updateInterface();
    }

    function drawBrightnessWalk() {
      const greyValue =
        Math.round(
          brightnessWalk.brightness /
          100 *
          255
        );

      context.fillStyle =
        `rgb(${greyValue},${greyValue},${greyValue})`;

      context.fillRect(
        0,
        0,
        WIDTH,
        HEIGHT
      );

      drawBrightnessGraph(
        greyValue
      );
    }

    function drawBrightnessGraph(
      backgroundGrey
    ) {
      const graphX = 28;
      const graphY = 28;
      const graphWidth = 280;
      const graphHeight = 150;

      const graphBackground =
        backgroundGrey > 128
          ? "rgba(0,0,0,0.78)"
          : "rgba(255,255,255,0.14)";

      const graphForeground =
        backgroundGrey > 128
          ? "#ffffff"
          : "#f0f6fc";

      const graphGrid =
        "rgba(180,180,180,0.3)";

      context.fillStyle =
        graphBackground;

      context.fillRect(
        graphX,
        graphY,
        graphWidth,
        graphHeight
      );

      context.strokeStyle =
        graphForeground;

      context.lineWidth = 1;

      context.strokeRect(
        graphX,
        graphY,
        graphWidth,
        graphHeight
      );

      context.strokeStyle =
        graphGrid;

      for (
        let percentage = 0;
        percentage <= 100;
        percentage += 25
      ) {
        const y =
          graphY +
          graphHeight -
          percentage /
          100 *
          graphHeight;

        context.beginPath();

        context.moveTo(
          graphX,
          y
        );

        context.lineTo(
          graphX + graphWidth,
          y
        );

        context.stroke();
      }

      context.fillStyle =
        graphForeground;

      context.font =
        "12px system-ui";

      context.textAlign =
        "left";

      context.fillText(
        "100",
        graphX + 5,
        graphY + 13
      );

      context.fillText(
        "50",
        graphX + 5,
        graphY + graphHeight / 2 + 4
      );

      context.fillText(
        "0",
        graphX + 5,
        graphY + graphHeight - 5
      );

      context.fillText(
        `${brightnessWalk.brightness.toFixed(2)}%`,
        graphX + graphWidth - 55,
        graphY + 16
      );

      const history =
        brightnessWalk.history;

      if (history.length < 2) {
        return;
      }

      context.strokeStyle =
        graphForeground;

      context.lineWidth = 2;

      context.beginPath();

      for (
        let index = 0;
        index < history.length;
        index++
      ) {
        const x =
          graphX +
          index /
          Math.max(
            1,
            history.length - 1
          ) *
          graphWidth;

        const y =
          graphY +
          graphHeight -
          history[index] /
          100 *
          graphHeight;

        if (index === 0) {
          context.moveTo(x, y);
        } else {
          context.lineTo(x, y);
        }
      }

      context.stroke();
    }

    function drawCurrentMode() {
      if (currentMode === "walk") {
        drawWalk();
      } else if (
        currentMode === "waterfall"
      ) {
        drawWaterfall();
      } else if (
        currentMode === "brightness"
      ) {
        drawBrightnessWalk();
      }
    }

    function animationLoop(timestamp) {
      if (!running) {
        return;
      }

      if (previousFrameTime === 0) {
        previousFrameTime =
          timestamp;
      }

      const elapsed =
        Math.min(
          100,
          timestamp -
          previousFrameTime
        );

      previousFrameTime =
        timestamp;

      if (
        currentMode === "walk" ||
        currentMode === "brightness"
      ) {
        accumulatedTime += elapsed;

        while (
          accumulatedTime >=
          RANDOM_STEP_INTERVAL &&
          running
        ) {
          if (currentMode === "walk") {
            performWalkStep();
          } else {
            performBrightnessStep();
          }

          accumulatedTime -=
            RANDOM_STEP_INTERVAL;
        }
      } else if (
        currentMode === "waterfall"
      ) {
        updateWaterfall(elapsed);
      }

      drawCurrentMode();

      if (running) {
        animationFrame =
          requestAnimationFrame(
            animationLoop
          );
      }
    }

    function resetCurrentExperiment() {
      running = false;
      wasRunningBeforeEmpty = false;

      cancelAnimationFrame(
        animationFrame
      );

      previousFrameTime = 0;
      accumulatedTime = 0;
      ballSpawnAccumulator = 0;

      startButton.textContent =
        "Start";

      if (currentMode === "walk") {
        resetWalk();
      } else if (
        currentMode === "waterfall"
      ) {
        buildWaterfall();
      } else if (
        currentMode === "brightness"
      ) {
        resetBrightnessWalk();
      }

      statusElement.textContent =
        quantumBuffer.length > 0
          ? "Quantumdata gereed"
          : "Quantumdata laden…";

      updateInterface();
      drawCurrentMode();
      ensureQuantumSupply();
    }

    async function startExperiment() {
      if (
        running ||
        currentMode === null
      ) {
        return;
      }

      if (quantumBuffer.length === 0) {
        await requestQuantumBatch();
      }

      if (quantumBuffer.length === 0) {
        wasRunningBeforeEmpty = true;
        ensureQuantumSupply();
        return;
      }

      running = true;
      wasRunningBeforeEmpty = false;

      startButton.textContent =
        "Pauzeer";

      statusElement.textContent =
        "Experiment actief";

      previousFrameTime = 0;

      animationFrame =
        requestAnimationFrame(
          animationLoop
        );
    }

    chooseWalkButton.addEventListener(
      "click",
      () => {
        showExperiment("walk");
      }
    );

    chooseWaterfallButton.addEventListener(
      "click",
      () => {
        showExperiment("waterfall");
      }
    );

    chooseBrightnessButton.addEventListener(
      "click",
      () => {
        showExperiment("brightness");
      }
    );

    startButton.addEventListener(
      "click",
      async () => {
        if (running) {
          running = false;
          wasRunningBeforeEmpty = false;

          cancelAnimationFrame(
            animationFrame
          );

          startButton.textContent =
            "Start";

          statusElement.textContent =
            "Gepauzeerd";

          return;
        }

        await startExperiment();
      }
    );

    restartButton.addEventListener(
      "click",
      async () => {
        resetCurrentExperiment();
        await startExperiment();
      }
    );

    menuButton.addEventListener(
      "click",
      showMenu
    );

    setInterval(
      ensureQuantumSupply,
      5_000
    );

    setInterval(
      updateInterface,
      1_000
    );

    async function initialize() {
      showMenu();

      resetWalk();
      buildWaterfall();
      resetBrightnessWalk();

      updateInterface();

      await requestQuantumBatch();
    }

    window.addEventListener(
      "DOMContentLoaded",
      initialize
    );
  </script>
</body>
</html>
