<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Quantum Random Experiments</title>

  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d1117;
      color: #f0f6fc;
    }

    .app {
      width: min(94vw, 820px);
      display: grid;
      gap: 14px;
      padding: 18px 0;
    }

    .choice-screen {
      min-height: 620px;
      display: grid;
      place-items: center;
      padding: 30px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
    }

    .choice-panel {
      width: min(100%, 740px);
      display: grid;
      gap: 24px;
      text-align: center;
    }

    .choice-panel h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 3rem);
    }

    .choice-panel p {
      margin: 8px 0 0;
      color: #8b949e;
    }

    .choice-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .choice-button {
      min-height: 170px;
      padding: 20px;
      display: grid;
      place-items: center;
      gap: 8px;
      background: #21262d;
      border: 1px solid #484f58;
      border-radius: 14px;
      color: #f0f6fc;
      cursor: pointer;
      font-size: 1rem;
    }

    .choice-button:hover {
      background: #30363d;
      border-color: #58a6ff;
    }

    .choice-icon {
      font-size: 2.5rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      color: white;
      background: #238636;
    }

    button.secondary {
      background: #30363d;
    }

    button.menu {
      background: #8b2c2c;
    }

    button:hover {
      filter: brightness(1.12);
    }

    .status {
      margin-left: auto;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #010409;
      border: 1px solid #484f58;
      border-radius: 12px;
    }

    .stats-panel {
      padding: 14px;
      display: grid;
      gap: 10px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
    }

    .stats-panel h2 {
      margin: 0;
      font-size: 1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 10px;
      background: #21262d;
      border-radius: 9px;
      text-align: center;
    }

    .stat-label {
      display: block;
      margin-bottom: 4px;
      color: #8b949e;
      font-size: 0.76rem;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 700;
    }

    .info {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      opacity: 0.76;
    }

    @media (max-width: 760px) {
      .choice-buttons {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .status {
        width: 100%;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <main class="app">

    <section id="choiceScreen" class="choice-screen">
      <div class="choice-panel">

        <div>
          <h1>Quantum-cryptographyt</h1>
          <p>Kies een visualisatie.</p>
        </div>

        <div class="choice-buttons">
          <button id="chooseWalkButton" class="choice-button" type="button">
            <span class="choice-icon">〰️</span>
            <strong>Random Walk</strong>
            <small>Quantum-random richtingen</small>
          </button>

          <button id="chooseWaterfallButton" class="choice-button" type="button">
            <span class="choice-icon">🔵</span>
            <strong>Knikkerwaterval</strong>
            <small>Quantum-random links/rechts</small>
          </button>

          <button id="chooseBrightnessButton" class="choice-button" type="button">
            <span class="choice-icon">◐</span>
            <strong>Lichtsterkte-walk</strong>
            <small>Verborgen 2D-walk bepaalt grijstint</small>
          </button>
        </div>

        <span id="choiceStatus">Quantumdata laden…</span>
        <small>Versie 1.5.3</small>

      </div>
    </section>

    <section id="experimentScreen" hidden>

      <div class="toolbar">
        <button id="startButton" type="button">Start</button>

        <button id="restartButton" class="secondary" type="button">
          Herstart
        </button>

        <button id="menuButton" class="menu" type="button">
          Terug naar menu
        </button>

        <span id="status" class="status">
          Quantumdata laden…
        </span>
      </div>

      <canvas id="arena" width="720" height="720"></canvas>

      <section class="stats-panel">
        <h2 id="statsTitle">Statistieken huidige run</h2>
        <div id="statsGrid" class="stats-grid"></div>
      </section>

      <div class="info">
        <span id="modeInfo">Modus: —</span>
        <span id="bufferInfo">Buffer: 0</span>
        <span id="counterInfo">Aantal: 0</span>
        <span id="requestInfo">Nog geen batch</span>
        <span id="nextRequestInfo">Volgende request: —</span>
        <span>Versie 1.5.3</span>
      </div>

    </section>

  </main>

  <script>
    "use strict";

    const VERSION = "1.5.3";

    const QRNG_URL =
      "https://qrng.anu.edu.au/API/jsonI.php" +
      "?length=1024&type=uint16";

    const SUCCESS_INTERVAL = 60_000;
    const FAILURE_INTERVAL = 90_000;
    const PREFETCH_THRESHOLD = 600;

    const RANDOM_STEPS_PER_SECOND = 10;
    const RANDOM_STEP_INTERVAL = 1000 / RANDOM_STEPS_PER_SECOND;
    const WALK_STEP_LENGTH = 10;

    const MAX_BRIGHTNESS_HISTORY = 1000;
    const INITIAL_BRIGHTNESS = 50;

    const BALL_SPAWN_INTERVAL = 700;
    const BALL_SPEED = 3.2;
    const BALL_RADIUS = 5;

    const PEG_ROWS = 11;
    const PEG_HORIZONTAL_SPACING = 48;
    const PEG_VERTICAL_SPACING = 43;
    const PEG_RADIUS = 4;

    const choiceScreen = document.getElementById("choiceScreen");
    const experimentScreen = document.getElementById("experimentScreen");

    const chooseWalkButton = document.getElementById("chooseWalkButton");
    const chooseWaterfallButton = document.getElementById("chooseWaterfallButton");
    const chooseBrightnessButton = document.getElementById("chooseBrightnessButton");

    const choiceStatus = document.getElementById("choiceStatus");
    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");
    const menuButton = document.getElementById("menuButton");
    const statusElement = document.getElementById("status");

    const modeInfo = document.getElementById("modeInfo");
    const bufferInfo = document.getElementById("bufferInfo");
    const counterInfo = document.getElementById("counterInfo");
    const requestInfo = document.getElementById("requestInfo");
    const nextRequestInfo = document.getElementById("nextRequestInfo");

    const statsTitle = document.getElementById("statsTitle");
    const statsGrid = document.getElementById("statsGrid");

    const canvas = document.getElementById("arena");
    const context = canvas.getContext("2d");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    let currentMode = null;
    let running = false;
    let wasRunningBeforeEmpty = false;

    let quantumBuffer = [];
    let localFallbackActive = false;
    let localFallbackCount = 0;

    let requestBusy = false;
    let requestTimer = null;
    let nextRequestAllowedAt = 0;
    let lastSuccessfulRequest = 0;
    let lastRequestError = null;

    let animationFrame = null;
    let previousFrameTime = 0;
    let accumulatedTime = 0;
    let ballSpawnAccumulator = 0;

    const walker = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      trail: [],
      steps: 0,

      proximitySum: {
        top: 0,
        right: 0,
        bottom: 0,
        left: 0
      },

      minimumDistance: {
        top: HEIGHT / 2,
        right: WIDTH / 2,
        bottom: HEIGHT / 2,
        left: WIDTH / 2
      }
    };

    const waterfall = {
      balls: [],
      pegs: [],
      bins: [],
      completedBalls: 0
    };

    const brightnessWalk = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      brightness: INITIAL_BRIGHTNESS,
      steps: 0,
      brightnessSum: INITIAL_BRIGHTNESS,
      minimumBrightness: INITIAL_BRIGHTNESS,
      maximumBrightness: INITIAL_BRIGHTNESS,
      history: [INITIAL_BRIGHTNESS]
    };

    function formatTime(timestamp) {
      return timestamp
        ? new Date(timestamp).toLocaleTimeString()
        : "—";
    }

    function createStat(label, value) {
      return `
        <div class="stat">
          <span class="stat-label">${label}</span>
          <span class="stat-value">${value}</span>
        </div>
      `;
    }

    function averageProximity(sum, steps) {
      return steps > 0
        ? `${(sum / steps).toFixed(2)}%`
        : "0.00%";
    }

    function percentage(part, total) {
      return total > 0
        ? `${(part / total * 100).toFixed(2)}%`
        : "0.00%";
    }

    function updateStatistics() {
      if (currentMode === "walk") {
        statsTitle.textContent =
          "Gemiddelde nabijheid tot de vier randen";

        statsGrid.innerHTML = [
          createStat(
            "Bovenrand",
            averageProximity(
              walker.proximitySum.top,
              walker.steps
            )
          ),
          createStat(
            "Rechterrand",
            averageProximity(
              walker.proximitySum.right,
              walker.steps
            )
          ),
          createStat(
            "Onderste rand",
            averageProximity(
              walker.proximitySum.bottom,
              walker.steps
            )
          ),
          createStat(
            "Linkerrand",
            averageProximity(
              walker.proximitySum.left,
              walker.steps
            )
          ),
          createStat(
            "Dichtst boven",
            `${walker.minimumDistance.top.toFixed(1)} px`
          ),
          createStat(
            "Dichtst rechts",
            `${walker.minimumDistance.right.toFixed(1)} px`
          ),
          createStat(
            "Dichtst onder",
            `${walker.minimumDistance.bottom.toFixed(1)} px`
          ),
          createStat(
            "Dichtst links",
            `${walker.minimumDistance.left.toFixed(1)} px`
          )
        ].join("");
      }

      if (currentMode === "brightness") {
        statsTitle.textContent =
          "Lichtsterkte huidige run";

        const sampleCount =
          brightnessWalk.steps + 1;

        const average =
          brightnessWalk.brightnessSum /
          sampleCount;

        statsGrid.innerHTML = [
          createStat(
            "Huidig",
            `${brightnessWalk.brightness.toFixed(2)}%`
          ),
          createStat(
            "Gemiddeld",
            `${average.toFixed(2)}%`
          ),
          createStat(
            "Minimum",
            `${brightnessWalk.minimumBrightness.toFixed(2)}%`
          ),
          createStat(
            "Maximum",
            `${brightnessWalk.maximumBrightness.toFixed(2)}%`
          ),
          createStat(
            "2D-positie X",
            `${brightnessWalk.x.toFixed(1)} px`
          ),
          createStat(
            "2D-positie Y",
            `${brightnessWalk.y.toFixed(1)} px`
          ),
          createStat(
            "Stappen",
            brightnessWalk.steps
          ),
          createStat(
            "Startwaarde",
            `${INITIAL_BRIGHTNESS}%`
          )
        ].join("");
      }

      if (currentMode === "waterfall") {
        statsTitle.textContent =
          "Knikkerverdeling huidige run";

        const total =
          waterfall.completedBalls;

        const center =
          PEG_ROWS / 2;

        let leftCount = 0;
        let centerCount = 0;
        let rightCount = 0;
        let weightedSum = 0;

        waterfall.bins.forEach((count, index) => {
          weightedSum += count * index;

          if (index < Math.floor(center)) {
            leftCount += count;
          } else if (index > Math.ceil(center)) {
            rightCount += count;
          } else {
            centerCount += count;
          }
        });

        const averageBin =
          total > 0
            ? weightedSum / total
            : 0;

        statsGrid.innerHTML = [
          createStat("Totaal", total),
          createStat("Links", percentage(leftCount, total)),
          createStat("Midden", percentage(centerCount, total)),
          createStat("Rechts", percentage(rightCount, total)),
          createStat("Gemiddelde bak", averageBin.toFixed(2)),
          createStat("Aantal bakken", waterfall.bins.length),
          createStat("Meest gevuld", Math.max(0, ...waterfall.bins)),
          createStat("Actieve knikkers", waterfall.balls.length)
        ].join("");
      }
    }

    function updateInterface() {
      bufferInfo.textContent =
        `Buffer: ${quantumBuffer.length}`;

      if (currentMode === "walk") {
        counterInfo.textContent =
          `Stappen: ${walker.steps}`;
      } else if (currentMode === "waterfall") {
        counterInfo.textContent =
          `Knikkers: ${waterfall.completedBalls}`;
      } else if (currentMode === "brightness") {
        counterInfo.textContent =
          `Lichtsterkte: ${brightnessWalk.brightness.toFixed(2)}%`;
      } else {
        counterInfo.textContent =
          "Aantal: 0";
      }

      requestInfo.textContent =
        lastSuccessfulRequest > 0
          ? `Laatste batch: ${formatTime(lastSuccessfulRequest)}`
          : "Nog geen batch";

      nextRequestInfo.textContent =
        nextRequestAllowedAt > Date.now()
          ? `Volgende request: ${formatTime(nextRequestAllowedAt)}`
          : "Volgende request: beschikbaar";

      if (requestBusy) {
        choiceStatus.textContent = localFallbackActive
          ? "Lokale random actief · quantumdata ophalen…"
          : "Quantumdata ophalen…";
      } else if (quantumBuffer.length > 0) {
        choiceStatus.textContent =
          `Quantumdata gereed · buffer ${quantumBuffer.length}`;
      } else if (lastRequestError || localFallbackActive) {
        choiceStatus.textContent =
          "Lokale JavaScript-random actief · QRNG-retry gepland";
      } else {
        choiceStatus.textContent =
          "Wachten op quantumdata…";
      }

      updateStatistics();
    }

    function clearRequestTimer() {
      if (requestTimer !== null) {
        clearTimeout(requestTimer);
        requestTimer = null;
      }
    }

    function scheduleRequestAt(timestamp) {
      clearRequestTimer();

      const delay =
        Math.max(0, timestamp - Date.now());

      requestTimer = setTimeout(() => {
        requestTimer = null;
        requestQuantumBatch();
      }, delay);

      updateInterface();
    }

    async function requestQuantumBatch() {
      if (requestBusy) {
        return false;
      }

      const now = Date.now();

      if (now < nextRequestAllowedAt) {
        scheduleRequestAt(nextRequestAllowedAt);
        return false;
      }

      clearRequestTimer();

      requestBusy = true;
      lastRequestError = null;

      statusElement.textContent =
        "Quantumdata ophalen…";

      updateInterface();

      try {
        const response = await fetch(
          `${QRNG_URL}&timestamp=${Date.now()}`,
          {
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error(
            `HTTP-fout ${response.status}`
          );
        }

        const result =
          await response.json();

        if (
          result.success !== true ||
          !Array.isArray(result.data) ||
          result.data.length === 0
        ) {
          throw new Error(
            "Ongeldig QRNG-antwoord"
          );
        }

        quantumBuffer.push(...result.data);
        localFallbackActive = false;

        lastSuccessfulRequest =
          Date.now();

        nextRequestAllowedAt =
          lastSuccessfulRequest +
          SUCCESS_INTERVAL;

        statusElement.textContent =
          running
            ? "Experiment actief · ANU-quantumdata"
            : "Quantumdata gereed";

        updateInterface();

        if (
          wasRunningBeforeEmpty &&
          !running &&
          currentMode !== null
        ) {
          wasRunningBeforeEmpty = false;
          startExperiment();
        }

        return true;

      } catch (error) {
        console.error(
          "QRNG-request mislukt:",
          error
        );

        lastRequestError = error;

        nextRequestAllowedAt =
          Date.now() +
          FAILURE_INTERVAL;

        if (quantumBuffer.length === 0) {
          localFallbackActive = true;
        }

        statusElement.textContent =
          quantumBuffer.length > 0
            ? "QRNG-fout · bestaande quantumbuffer actief"
            : "QRNG-fout · lokale JavaScript-random actief";

        scheduleRequestAt(
          nextRequestAllowedAt
        );

        return false;

      } finally {
        requestBusy = false;
        updateInterface();
      }
    }

    function ensureQuantumSupply() {
      if (
        quantumBuffer.length <=
        PREFETCH_THRESHOLD
      ) {
        requestQuantumBatch();
      }
    }

    function createLocalRandomUint16() {
      if (
        window.crypto &&
        typeof window.crypto.getRandomValues === "function"
      ) {
        const values = new Uint16Array(1);
        window.crypto.getRandomValues(values);
        return values[0];
      }

      return Math.floor(Math.random() * 65536);
    }

    function takeQuantumNumber() {
      ensureQuantumSupply();

      if (quantumBuffer.length === 0) {
        localFallbackActive = true;
        localFallbackCount++;

        statusElement.textContent =
          "Experiment actief · lokale JavaScript-random";

        updateInterface();
        return createLocalRandomUint16();
      }

      const value =
        quantumBuffer.shift();

      localFallbackActive = false;
      updateInterface();
      ensureQuantumSupply();

      return value;
    }

    function showMenu() {
      running = false;
      currentMode = null;

      cancelAnimationFrame(animationFrame);

      experimentScreen.hidden = true;
      choiceScreen.hidden = false;

      startButton.textContent =
        "Start";

      updateInterface();
    }

    function showExperiment(mode) {
      currentMode = mode;

      choiceScreen.hidden = true;
      experimentScreen.hidden = false;

      if (mode === "walk") {
        modeInfo.textContent =
          "Modus: Random Walk";
      } else if (mode === "waterfall") {
        modeInfo.textContent =
          "Modus: Knikkerwaterval";
      } else {
        modeInfo.textContent =
          "Modus: Lichtsterkte via 2D-walk";
      }

      resetCurrentExperiment();
    }

    function resetWalk() {
      walker.x = WIDTH / 2;
      walker.y = HEIGHT / 2;
      walker.trail = [];
      walker.steps = 0;

      walker.proximitySum = {
        top: 0,
        right: 0,
        bottom: 0,
        left: 0
      };

      walker.minimumDistance = {
        top: HEIGHT / 2,
        right: WIDTH / 2,
        bottom: HEIGHT / 2,
        left: WIDTH / 2
      };
    }

    function updateWalkStatistics() {
      const topDistance =
        walker.y;

      const rightDistance =
        WIDTH - walker.x;

      const bottomDistance =
        HEIGHT - walker.y;

      const leftDistance =
        walker.x;

      /*
        100% betekent op de betreffende rand.
        0% betekent op de tegenoverliggende rand.
      */
      walker.proximitySum.top +=
        (1 - topDistance / HEIGHT) * 100;

      walker.proximitySum.right +=
        (1 - rightDistance / WIDTH) * 100;

      walker.proximitySum.bottom +=
        (1 - bottomDistance / HEIGHT) * 100;

      walker.proximitySum.left +=
        (1 - leftDistance / WIDTH) * 100;

      walker.minimumDistance.top =
        Math.min(
          walker.minimumDistance.top,
          topDistance
        );

      walker.minimumDistance.right =
        Math.min(
          walker.minimumDistance.right,
          rightDistance
        );

      walker.minimumDistance.bottom =
        Math.min(
          walker.minimumDistance.bottom,
          bottomDistance
        );

      walker.minimumDistance.left =
        Math.min(
          walker.minimumDistance.left,
          leftDistance
        );
    }

    function performWalkStep() {
      const quantumValue =
        takeQuantumNumber();

      const angle =
        quantumValue /
        65536 *
        Math.PI *
        2;

      const oldX = walker.x;
      const oldY = walker.y;

      walker.x +=
        Math.cos(angle) *
        WALK_STEP_LENGTH;

      walker.y +=
        Math.sin(angle) *
        WALK_STEP_LENGTH;

      if (walker.x < 0) {
        walker.x = -walker.x;
      }

      if (walker.x > WIDTH) {
        walker.x =
          WIDTH -
          (walker.x - WIDTH);
      }

      if (walker.y < 0) {
        walker.y = -walker.y;
      }

      if (walker.y > HEIGHT) {
        walker.y =
          HEIGHT -
          (walker.y - HEIGHT);
      }

      walker.trail.push({
        x1: oldX,
        y1: oldY,
        x2: walker.x,
        y2: walker.y
      });

      walker.steps++;

      updateWalkStatistics();
      updateInterface();
    }

    function drawWalk() {
      context.fillStyle = "#010409";
      context.fillRect(0, 0, WIDTH, HEIGHT);

      context.lineWidth = 1.5;
      context.lineCap = "round";

      walker.trail.forEach((segment, index) => {
        const relativeAge =
          index /
          Math.max(1, walker.trail.length);

        const alpha =
          0.2 +
          relativeAge * 0.75;

        context.strokeStyle =
          `rgba(88,166,255,${alpha})`;

        context.beginPath();
        context.moveTo(segment.x1, segment.y1);
        context.lineTo(segment.x2, segment.y2);
        context.stroke();
      });

      context.fillStyle = "#f2cc60";
      context.beginPath();
      context.arc(
        walker.x,
        walker.y,
        4.5,
        0,
        Math.PI * 2
      );
      context.fill();
    }

    function buildWaterfall() {
      waterfall.pegs = [];
      waterfall.balls = [];
      waterfall.completedBalls = 0;

      const startY = 85;

      for (let row = 0; row < PEG_ROWS; row++) {
        const pegsInRow = row + 1;

        const rowWidth =
          (pegsInRow - 1) *
          PEG_HORIZONTAL_SPACING;

        const startX =
          WIDTH / 2 -
          rowWidth / 2;

        for (
          let column = 0;
          column < pegsInRow;
          column++
        ) {
          waterfall.pegs.push({
            x:
              startX +
              column *
              PEG_HORIZONTAL_SPACING,
            y:
              startY +
              row *
              PEG_VERTICAL_SPACING
          });
        }
      }

      waterfall.bins =
        new Array(
          PEG_ROWS + 1
        ).fill(0);
    }

    function spawnBall() {
      waterfall.balls.push({
        x: WIDTH / 2,
        y: 30,
        vy: BALL_SPEED,
        row: 0,
        choices: 0
      });
    }

    function updateBall(ball) {
      ball.y += ball.vy;

      if (ball.row < PEG_ROWS) {
        const pegY =
          85 +
          ball.row *
          PEG_VERTICAL_SPACING;

        if (ball.y >= pegY) {
          const quantumValue =
            takeQuantumNumber();

          const goRight =
            quantumValue % 2 === 1;

          ball.x +=
            goRight
              ? PEG_HORIZONTAL_SPACING / 2
              : -PEG_HORIZONTAL_SPACING / 2;

          if (goRight) {
            ball.choices++;
          }

          ball.row++;
        }
      }

      const binsTop =
        85 +
        PEG_ROWS *
        PEG_VERTICAL_SPACING +
        18;

      if (ball.y >= binsTop) {
        const binIndex =
          Math.max(
            0,
            Math.min(
              waterfall.bins.length - 1,
              ball.choices
            )
          );

        waterfall.bins[binIndex]++;
        waterfall.completedBalls++;

        updateInterface();
        return false;
      }

      return true;
    }

    function updateWaterfall(elapsed) {
      ballSpawnAccumulator += elapsed;

      while (
        ballSpawnAccumulator >=
        BALL_SPAWN_INTERVAL &&
        running
      ) {
        spawnBall();

        ballSpawnAccumulator -=
          BALL_SPAWN_INTERVAL;
      }

      waterfall.balls =
        waterfall.balls.filter(updateBall);
    }

    function drawWaterfall() {
      context.fillStyle = "#010409";
      context.fillRect(0, 0, WIDTH, HEIGHT);

      context.fillStyle = "#8b949e";

      waterfall.pegs.forEach(peg => {
        context.beginPath();
        context.arc(
          peg.x,
          peg.y,
          PEG_RADIUS,
          0,
          Math.PI * 2
        );
        context.fill();
      });

      context.fillStyle = "#58a6ff";

      waterfall.balls.forEach(ball => {
        context.beginPath();
        context.arc(
          ball.x,
          ball.y,
          BALL_RADIUS,
          0,
          Math.PI * 2
        );
        context.fill();
      });

      const binsTop =
        85 +
        PEG_ROWS *
        PEG_VERTICAL_SPACING +
        18;

      const binWidth =
        WIDTH /
        waterfall.bins.length;

      const maximum =
        Math.max(1, ...waterfall.bins);

      context.font = "13px system-ui";
      context.textAlign = "center";

      waterfall.bins.forEach((count, index) => {
        const x =
          index * binWidth;

        const maximumBarHeight =
          HEIGHT -
          binsTop -
          42;

        const barHeight =
          count /
          maximum *
          maximumBarHeight;

        context.strokeStyle = "#484f58";

        context.strokeRect(
          x,
          binsTop,
          binWidth,
          HEIGHT - binsTop - 30
        );

        context.fillStyle =
          "rgba(88,166,255,0.6)";

        context.fillRect(
          x + 2,
          HEIGHT - 32 - barHeight,
          binWidth - 4,
          barHeight
        );

        context.fillStyle = "#f0f6fc";

        context.fillText(
          String(count),
          x + binWidth / 2,
          HEIGHT - 10
        );
      });
    }

    function resetBrightnessWalk() {
      brightnessWalk.x = WIDTH / 2;
      brightnessWalk.y = HEIGHT / 2;
      brightnessWalk.brightness = INITIAL_BRIGHTNESS;
      brightnessWalk.steps = 0;
      brightnessWalk.brightnessSum = INITIAL_BRIGHTNESS;
      brightnessWalk.minimumBrightness = INITIAL_BRIGHTNESS;
      brightnessWalk.maximumBrightness = INITIAL_BRIGHTNESS;
      brightnessWalk.history = [INITIAL_BRIGHTNESS];
    }

    function performBrightnessStep() {
      const quantumValue =
        takeQuantumNumber();

      const angle =
        quantumValue /
        65536 *
        Math.PI *
        2;

      brightnessWalk.x +=
        Math.cos(angle) *
        WALK_STEP_LENGTH;

      brightnessWalk.y +=
        Math.sin(angle) *
        WALK_STEP_LENGTH;

      if (brightnessWalk.x < 0) {
        brightnessWalk.x =
          -brightnessWalk.x;
      }

      if (brightnessWalk.x > WIDTH) {
        brightnessWalk.x =
          WIDTH -
          (brightnessWalk.x - WIDTH);
      }

      if (brightnessWalk.y < 0) {
        brightnessWalk.y =
          -brightnessWalk.y;
      }

      if (brightnessWalk.y > HEIGHT) {
        brightnessWalk.y =
          HEIGHT -
          (brightnessWalk.y - HEIGHT);
      }

      brightnessWalk.brightness =
        100 -
        (
          brightnessWalk.y /
          HEIGHT *
          100
        );

      brightnessWalk.steps++;

      brightnessWalk.brightnessSum +=
        brightnessWalk.brightness;

      brightnessWalk.minimumBrightness =
        Math.min(
          brightnessWalk.minimumBrightness,
          brightnessWalk.brightness
        );

      brightnessWalk.maximumBrightness =
        Math.max(
          brightnessWalk.maximumBrightness,
          brightnessWalk.brightness
        );

      brightnessWalk.history.push(
        brightnessWalk.brightness
      );

      if (
        brightnessWalk.history.length >
        MAX_BRIGHTNESS_HISTORY
      ) {
        brightnessWalk.history.shift();
      }

      updateInterface();
    }

    function drawBrightnessWalk() {
      const greyValue =
        Math.round(
          brightnessWalk.brightness /
          100 *
          255
        );

      context.fillStyle =
        `rgb(${greyValue},${greyValue},${greyValue})`;

      context.fillRect(
        0,
        0,
        WIDTH,
        HEIGHT
      );

      drawBrightnessGraph(greyValue);
      drawBrightnessRunAverage(greyValue);
    }

    function drawBrightnessRunAverage(backgroundGrey) {
      const sampleCount =
        brightnessWalk.steps + 1;

      const runningAverage =
        brightnessWalk.brightnessSum /
        sampleCount;

      const foreground =
        backgroundGrey > 128
          ? "#111111"
          : "#ffffff";

      const panelBackground =
        backgroundGrey > 128
          ? "rgba(255,255,255,0.72)"
          : "rgba(0,0,0,0.62)";

      const panelWidth = 226;
      const panelHeight = 58;
      const panelX = WIDTH - panelWidth - 28;
      const panelY = 28;

      context.fillStyle = panelBackground;
      context.fillRect(
        panelX,
        panelY,
        panelWidth,
        panelHeight
      );

      context.strokeStyle = foreground;
      context.lineWidth = 1;
      context.strokeRect(
        panelX,
        panelY,
        panelWidth,
        panelHeight
      );

      context.fillStyle = foreground;
      context.textAlign = "right";
      context.font = "12px system-ui";
      context.fillText(
        "VOORTSCHRIJDEND GEMIDDELDE",
        panelX + panelWidth - 12,
        panelY + 18
      );

      context.font = "bold 25px system-ui";
      context.fillText(
        `${runningAverage.toFixed(2)}%`,
        panelX + panelWidth - 12,
        panelY + 47
      );
    }

    function drawBrightnessGraph(backgroundGrey) {
      const graphX = 28;
      const graphY = 28;
      const graphWidth = 280;
      const graphHeight = 150;

      const graphBackground =
        backgroundGrey > 128
          ? "rgba(0,0,0,0.78)"
          : "rgba(255,255,255,0.14)";

      const graphForeground =
        backgroundGrey > 128
          ? "#ffffff"
          : "#f0f6fc";

      context.fillStyle = graphBackground;
      context.fillRect(
        graphX,
        graphY,
        graphWidth,
        graphHeight
      );

      context.strokeStyle = graphForeground;
      context.lineWidth = 1;
      context.strokeRect(
        graphX,
        graphY,
        graphWidth,
        graphHeight
      );

      context.strokeStyle =
        "rgba(180,180,180,0.3)";

      for (
        let value = 0;
        value <= 100;
        value += 25
      ) {
        const y =
          graphY +
          graphHeight -
          value /
          100 *
          graphHeight;

        context.beginPath();
        context.moveTo(graphX, y);
        context.lineTo(graphX + graphWidth, y);
        context.stroke();
      }

      context.fillStyle = graphForeground;
      context.font = "12px system-ui";
      context.textAlign = "left";

      context.fillText("100", graphX + 5, graphY + 13);
      context.fillText(
        "50",
        graphX + 5,
        graphY + graphHeight / 2 + 4
      );
      context.fillText(
        "0",
        graphX + 5,
        graphY + graphHeight - 5
      );

      context.fillText(
        `${brightnessWalk.brightness.toFixed(2)}%`,
        graphX + graphWidth - 55,
        graphY + 16
      );

      const history =
        brightnessWalk.history;

      if (history.length < 2) {
        return;
      }

      context.strokeStyle = graphForeground;
      context.lineWidth = 2;
      context.beginPath();

      history.forEach((value, index) => {
        const x =
          graphX +
          index /
          Math.max(1, history.length - 1) *
          graphWidth;

        const y =
          graphY +
          graphHeight -
          value /
          100 *
          graphHeight;

        if (index === 0) {
          context.moveTo(x, y);
        } else {
          context.lineTo(x, y);
        }
      });

      context.stroke();
    }

    function drawCurrentMode() {
      if (currentMode === "walk") {
        drawWalk();
      } else if (currentMode === "waterfall") {
        drawWaterfall();
      } else if (currentMode === "brightness") {
        drawBrightnessWalk();
      }
    }

    function animationLoop(timestamp) {
      if (!running) {
        return;
      }

      if (previousFrameTime === 0) {
        previousFrameTime = timestamp;
      }

      const elapsed =
        Math.min(
          100,
          timestamp - previousFrameTime
        );

      previousFrameTime = timestamp;

      if (
        currentMode === "walk" ||
        currentMode === "brightness"
      ) {
        accumulatedTime += elapsed;

        while (
          accumulatedTime >=
          RANDOM_STEP_INTERVAL &&
          running
        ) {
          if (currentMode === "walk") {
            performWalkStep();
          } else {
            performBrightnessStep();
          }

          accumulatedTime -=
            RANDOM_STEP_INTERVAL;
        }
      } else if (
        currentMode === "waterfall"
      ) {
        updateWaterfall(elapsed);
      }

      drawCurrentMode();

      if (running) {
        animationFrame =
          requestAnimationFrame(
            animationLoop
          );
      }
    }

    function resetCurrentExperiment() {
      running = false;
      wasRunningBeforeEmpty = false;

      cancelAnimationFrame(animationFrame);

      previousFrameTime = 0;
      accumulatedTime = 0;
      ballSpawnAccumulator = 0;

      startButton.textContent = "Start";

      if (currentMode === "walk") {
        resetWalk();
      } else if (currentMode === "waterfall") {
        buildWaterfall();
      } else if (currentMode === "brightness") {
        resetBrightnessWalk();
      }

      statusElement.textContent =
        quantumBuffer.length > 0
          ? "Quantumdata gereed"
          : "Quantumdata laden · lokale fallback beschikbaar";

      updateInterface();
      drawCurrentMode();
      ensureQuantumSupply();
    }

    async function startExperiment() {
      if (
        running ||
        currentMode === null
      ) {
        return;
      }

      if (quantumBuffer.length === 0) {
        requestQuantumBatch();
        localFallbackActive = true;
      }

      running = true;
      wasRunningBeforeEmpty = false;

      startButton.textContent = "Pauzeer";
      statusElement.textContent =
        quantumBuffer.length > 0
          ? "Experiment actief · ANU-quantumdata"
          : "Experiment actief · lokale JavaScript-random";

      previousFrameTime = 0;

      animationFrame =
        requestAnimationFrame(
          animationLoop
        );
    }

    chooseWalkButton.addEventListener(
      "click",
      () => showExperiment("walk")
    );

    chooseWaterfallButton.addEventListener(
      "click",
      () => showExperiment("waterfall")
    );

    chooseBrightnessButton.addEventListener(
      "click",
      () => showExperiment("brightness")
    );

    startButton.addEventListener(
      "click",
      async () => {
        if (running) {
          running = false;
          wasRunningBeforeEmpty = false;

          cancelAnimationFrame(animationFrame);

          startButton.textContent = "Start";
          statusElement.textContent = "Gepauzeerd";
          return;
        }

        await startExperiment();
      }
    );

    restartButton.addEventListener(
      "click",
      async () => {
        resetCurrentExperiment();
        await startExperiment();
      }
    );

    menuButton.addEventListener(
      "click",
      showMenu
    );

    setInterval(
      ensureQuantumSupply,
      5_000
    );

    setInterval(
      updateInterface,
      1_000
    );

    async function initialize() {
      showMenu();

      resetWalk();
      buildWaterfall();
      resetBrightnessWalk();

      updateInterface();

      await requestQuantumBatch();
    }

    window.addEventListener(
      "DOMContentLoaded",
      initialize
    );
  </script>
</body>
</html>
