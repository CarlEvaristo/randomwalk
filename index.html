<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chaotische Quantum Memory Walk</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d1117;
      color: #f0f6fc;
    }

    .app {
      width: min(92vw, 780px);
      display: grid;
      gap: 14px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      background: #238636;
      color: white;
    }

    button.secondary { background: #30363d; }
    button:hover { filter: brightness(1.12); }
    button:disabled { cursor: wait; opacity: 0.55; }

    .status {
      margin-left: auto;
      opacity: 0.9;
      font-size: 0.92rem;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #010409;
      border: 1px solid #484f58;
      border-radius: 12px;
    }

    .note {
      margin: 0;
      opacity: 0.76;
      font-size: 0.88rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="toolbar">
      <button id="toggleBtn">Start</button>
      <button id="restartBtn" class="secondary">Herstart</button>
      <span class="status" id="status">Quantum-buffer laden…</span>
    </div>

    <canvas id="arena" width="720" height="720"></canvas>

    <p class="note">
      Richtingsruis komt uit de publieke qrandom.io-QRNG. Het oude pad blijft zichtbaar
      en werkt als geheugen terug op de volgende bewegingen.
    </p>
  </main>

  <script>
    "use strict";

    const API_URL = "https://qrandom.io/api/random/ints?min=0&max=65535&n=512";

    const canvas = document.getElementById("arena");
    const ctx = canvas.getContext("2d");
    const toggleBtn = document.getElementById("toggleBtn");
    const restartBtn = document.getElementById("restartBtn");
    const statusEl = document.getElementById("status");

    const W = canvas.width;
    const H = canvas.height;

    const walker = {
      x: W / 2,
      y: H / 2,
      angle: 0,
      speed: 2.15,
      trail: [],
      step: 0
    };

    const settings = {
      visibleTrail: 5000,
      activeMemory: 1800,
      memoryStrength: 5.2,
      localRadius: 46,
      quantumTurnStrength: 0.16,
      inertia: 0.84,
      sampleStride: 4
    };

    let running = false;
    let animationId = null;
    let quantumBuffer = [];
    let fetching = false;
    let apiFailed = false;

    async function refillQuantumBuffer() {
      if (fetching || quantumBuffer.length > 700) return;
      fetching = true;
      apiFailed = false;

      try {
        const response = await fetch(API_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        if (!Array.isArray(data.numbers) || data.numbers.length === 0) {
          throw new Error("Geen quantumgetallen ontvangen");
        }

        quantumBuffer.push(...data.numbers);
        statusEl.textContent = running
          ? `Actief · ${quantumBuffer.length} quantumgetallen`
          : `Gereed · ${quantumBuffer.length} quantumgetallen`;
      } catch (error) {
        apiFailed = true;
        running = false;
        cancelAnimationFrame(animationId);
        toggleBtn.textContent = "Start";
        statusEl.textContent = "QRNG-verbinding mislukt";
        console.error(error);
      } finally {
        fetching = false;
      }
    }

    function takeQuantumUnit() {
      if (quantumBuffer.length < 180) refillQuantumBuffer();
      if (quantumBuffer.length === 0) return null;

      // Omzetten naar een getal van -1 tot +1.
      return (quantumBuffer.shift() / 65535) * 2 - 1;
    }

    function angleDifference(a, b) {
      let d = a - b;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      return d;
    }

    function memoryForce() {
      let fx = 0;
      let fy = 0;
      let weightSum = 0;

      const start = Math.max(0, walker.trail.length - settings.activeMemory);

      for (let i = start; i < walker.trail.length; i += settings.sampleStride) {
        const p = walker.trail[i];
        const dx = walker.x - p.x;
        const dy = walker.y - p.y;
        const d2 = dx * dx + dy * dy;

        if (d2 < 4 || d2 > settings.localRadius ** 2) continue;

        const d = Math.sqrt(d2);
        const age = walker.trail.length - i;
        const ageWeight = Math.exp(-age / 540);
        const spatialWeight = Math.exp(-d / 20);
        const wave = Math.sin(d * 0.36 - age * 0.09);
        const weight = ageWeight * spatialWeight * wave;

        fx += (dx / d) * weight;
        fy += (dy / d) * weight;
        weightSum += Math.abs(weight);
      }

      if (weightSum === 0) return 0;

      const target = Math.atan2(fy, fx);
      return angleDifference(target, walker.angle) * settings.memoryStrength;
    }

    function boundaryForce() {
      const margin = 68;
      let fx = 0;
      let fy = 0;

      if (walker.x < margin) fx += (margin - walker.x) / margin;
      if (walker.x > W - margin) fx -= (walker.x - (W - margin)) / margin;
      if (walker.y < margin) fy += (margin - walker.y) / margin;
      if (walker.y > H - margin) fy -= (walker.y - (H - margin)) / margin;

      if (fx === 0 && fy === 0) return 0;
      return angleDifference(Math.atan2(fy, fx), walker.angle) * 2.8;
    }

    function update() {
      const quantum = takeQuantumUnit();

      if (quantum === null) {
        running = false;
        toggleBtn.textContent = "Start";
        statusEl.textContent = fetching ? "Nieuwe quantumdata laden…" : "Quantum-buffer leeg";
        return false;
      }

      walker.step++;

      const feedback = memoryForce();
      const edge = boundaryForce();
      const quantumTurn = quantum * settings.quantumTurnStrength;

      const desiredAngle = walker.angle + quantumTurn + feedback + edge;
      walker.angle =
        walker.angle * settings.inertia +
        desiredAngle * (1 - settings.inertia);

      walker.x += Math.cos(walker.angle) * walker.speed;
      walker.y += Math.sin(walker.angle) * walker.speed;

      if (walker.x < 0 || walker.x > W) {
        walker.angle = Math.PI - walker.angle;
        walker.x = Math.max(0, Math.min(W, walker.x));
      }

      if (walker.y < 0 || walker.y > H) {
        walker.angle = -walker.angle;
        walker.y = Math.max(0, Math.min(H, walker.y));
      }

      walker.trail.push({ x: walker.x, y: walker.y });

      if (walker.trail.length > settings.visibleTrail) {
        walker.trail.splice(0, walker.trail.length - settings.visibleTrail);
      }

      return true;
    }

    function draw() {
      ctx.fillStyle = "#010409";
      ctx.fillRect(0, 0, W, H);

      if (walker.trail.length > 1) {
        // Oud spoor: helder genoeg om de volledige geschiedenis te blijven zien.
        ctx.lineWidth = 1.25;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        const chunkSize = 250;
        for (let start = 1; start < walker.trail.length; start += chunkSize) {
          const end = Math.min(walker.trail.length, start + chunkSize);
          const relativeAge = end / walker.trail.length;
          ctx.strokeStyle = `rgba(88, 166, 255, ${0.16 + relativeAge * 0.62})`;

          ctx.beginPath();
          ctx.moveTo(walker.trail[start - 1].x, walker.trail[start - 1].y);

          for (let i = start; i < end; i++) {
            ctx.lineTo(walker.trail[i].x, walker.trail[i].y);
          }
          ctx.stroke();
        }
      }

      ctx.fillStyle = "#f2cc60";
      ctx.beginPath();
      ctx.arc(walker.x, walker.y, 4.2, 0, Math.PI * 2);
      ctx.fill();
    }

    function loop() {
      if (!running) return;

      for (let i = 0; i < 3; i++) {
        if (!update()) break;
      }

      draw();

      if (running) animationId = requestAnimationFrame(loop);
    }

    async function reset() {
      running = false;
      cancelAnimationFrame(animationId);

      walker.x = W / 2;
      walker.y = H / 2;
      walker.angle = 0;
      walker.trail = [{ x: walker.x, y: walker.y }];
      walker.step = 0;

      toggleBtn.textContent = "Start";
      statusEl.textContent = "Quantum-buffer laden…";
      draw();

      await refillQuantumBuffer();

      if (!apiFailed) {
        const initialQuantum = takeQuantumUnit();
        walker.angle = initialQuantum === null
          ? 0
          : (initialQuantum + 1) * Math.PI;
        statusEl.textContent = `Gereed · ${quantumBuffer.length} quantumgetallen`;
      }
    }

    toggleBtn.addEventListener("click", async () => {
      if (quantumBuffer.length === 0) await refillQuantumBuffer();
      if (quantumBuffer.length === 0) return;

      running = !running;
      toggleBtn.textContent = running ? "Pauzeer" : "Start";
      statusEl.textContent = running
        ? `Actief · ${quantumBuffer.length} quantumgetallen`
        : `Gepauzeerd · ${quantumBuffer.length} quantumgetallen`;

      if (running) loop();
      else cancelAnimationFrame(animationId);
    });

    restartBtn.addEventListener("click", async () => {
      await reset();

      if (quantumBuffer.length > 0) {
        running = true;
        toggleBtn.textContent = "Pauzeer";
        statusEl.textContent = `Actief · ${quantumBuffer.length} quantumgetallen`;
        loop();
      }
    });

    reset();
  </script>
</body>
</html>
