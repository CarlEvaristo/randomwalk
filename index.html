<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quantum Random Walk</title>

  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d1117;
      color: #f0f6fc;
    }

    .app {
      width: min(92vw, 780px);
      display: grid;
      gap: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      color: white;
      background: #238636;
    }

    button.secondary {
      background: #30363d;
    }

    button:hover {
      filter: brightness(1.12);
    }

    .status {
      margin-left: auto;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #010409;
      border: 1px solid #484f58;
      border-radius: 12px;
    }

    .info {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      flex-wrap: wrap;
      font-size: 0.85rem;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <main class="app">

    <div class="toolbar">
      <button id="startButton">Start</button>

      <button
        id="restartButton"
        class="secondary"
      >
        Herstart
      </button>

      <span
        id="status"
        class="status"
      >
        Quantumdata laden…
      </span>
    </div>

    <canvas
      id="arena"
      width="720"
      height="720"
    ></canvas>

    <div class="info">
      <span id="bufferInfo">Buffer: 0</span>
      <span id="stepInfo">Stappen: 0</span>
      <span id="requestInfo">Nog geen request</span>
      <span id="versionInfo">Versie 1.2.0</span>
      <span id="deployInfo">Deploy: 2026-07-11</span>
    </div>

  </main>

  <script>
    "use strict";

    const QRNG_URL =
      "https://qrng.anu.edu.au/API/jsonI.php" +
      "?length=1024&type=uint16";

    /*
      Niet vaker dan één normaal request per minuut.
    */
    const MIN_REQUEST_INTERVAL = 60_000;

    /*
      Na een mislukking 90 seconden wachten.
    */
    const RETRY_INTERVAL = 90_000;

    /*
      Nieuwe batch aanvragen wanneer nog 600
      getallen in de buffer zitten.
    */
    const PREFETCH_THRESHOLD = 600;

    const STEPS_PER_SECOND = 10;
    const STEP_INTERVAL = 1000 / STEPS_PER_SECOND;
    const STEP_LENGTH = 10;

    const canvas =
      document.getElementById("arena");

    const context =
      canvas.getContext("2d");

    const startButton =
      document.getElementById("startButton");

    const restartButton =
      document.getElementById("restartButton");

    const statusElement =
      document.getElementById("status");

    const bufferInfo =
      document.getElementById("bufferInfo");

    const stepInfo =
      document.getElementById("stepInfo");

    const requestInfo =
      document.getElementById("requestInfo");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    const walker = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      trail: [],
      steps: 0
    };

    let running = false;
    let wasRunningBeforeEmpty = false;

    let quantumBuffer = [];

    let requestBusy = false;
    let lastRequestAttempt = 0;
    let lastSuccessfulRequest = 0;
    let retryTimer = null;

    let animationFrame = null;
    let previousFrameTime = 0;
    let accumulatedTime = 0;

    function updateInterface() {
      bufferInfo.textContent =
        `Buffer: ${quantumBuffer.length}`;

      stepInfo.textContent =
        `Stappen: ${walker.steps}`;

      if (lastSuccessfulRequest > 0) {
        const time =
          new Date(lastSuccessfulRequest);

        requestInfo.textContent =
          `Laatste batch: ${time.toLocaleTimeString()}`;
      }
    }

    function scheduleRetry() {
      clearTimeout(retryTimer);

      statusElement.textContent =
        quantumBuffer.length > 0
          ? "QRNG-fout · buffer nog actief"
          : "QRNG-fout · nieuwe poging over 90 seconden";

      retryTimer = setTimeout(async () => {
        const success =
          await fetchQuantumBatch(true);

        if (!success) {
          scheduleRetry();
        }
      }, RETRY_INTERVAL);
    }

    async function fetchQuantumBatch(
      forceRetry = false
    ) {
      const now = Date.now();

      if (requestBusy) {
        return false;
      }

      /*
        Normale prefetch respecteert de minimale
        tijd sinds het laatste succesvolle request.
      */
      if (
        !forceRetry &&
        lastSuccessfulRequest > 0 &&
        now - lastSuccessfulRequest <
        MIN_REQUEST_INTERVAL
      ) {
        return false;
      }

      /*
        Ook geforceerde retries mogen niet sneller
        dan RETRY_INTERVAL plaatsvinden.
      */
      if (
        forceRetry &&
        lastRequestAttempt > 0 &&
        now - lastRequestAttempt <
        RETRY_INTERVAL
      ) {
        return false;
      }

      requestBusy = true;
      lastRequestAttempt = now;

      statusElement.textContent =
        "Quantumdata ophalen…";

      try {
        const requestUrl =
          `${QRNG_URL}&timestamp=${Date.now()}`;

        const response = await fetch(
          requestUrl,
          {
            method: "GET",
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error(
            `HTTP-fout ${response.status}`
          );
        }

        const result =
          await response.json();

        if (
          result.success !== true ||
          !Array.isArray(result.data) ||
          result.data.length === 0
        ) {
          throw new Error(
            "Ongeldig QRNG-antwoord"
          );
        }

        quantumBuffer.push(
          ...result.data
        );

        lastSuccessfulRequest =
          Date.now();

        clearTimeout(retryTimer);

        updateInterface();

        statusElement.textContent =
          running
            ? "Quantum walk actief"
            : "Quantumdata gereed";

        /*
          Automatisch hervatten wanneer de walk
          door een lege buffer was gestopt.
        */
        if (
          wasRunningBeforeEmpty &&
          !running
        ) {
          wasRunningBeforeEmpty = false;
          startWalk();
        }

        return true;

      } catch (error) {
        console.error(
          "QRNG-request mislukt:",
          error
        );

        scheduleRetry();

        return false;

      } finally {
        requestBusy = false;
      }
    }

    function checkBuffer() {
      /*
        Ruim voor de buffer leeg is een nieuwe
        batch aanvragen.
      */
      if (
        quantumBuffer.length <=
        PREFETCH_THRESHOLD &&
        !requestBusy
      ) {
        fetchQuantumBatch(false);
      }

      /*
        Wanneer de buffer leeg is en geen retry
        gepland staat, plan dan een retry.
      */
      if (
        quantumBuffer.length === 0 &&
        !requestBusy &&
        retryTimer === null
      ) {
        scheduleRetry();
      }
    }

    function getQuantumDirection() {
      checkBuffer();

      if (quantumBuffer.length === 0) {
        return null;
      }

      const value =
        quantumBuffer.shift();

      updateInterface();
      checkBuffer();

      /*
        Zet uint16 om naar een hoek
        tussen 0 en 360 graden.
      */
      return (
        value / 65536
      ) * Math.PI * 2;
    }

    function performStep() {
      const angle =
        getQuantumDirection();

      if (angle === null) {
        wasRunningBeforeEmpty = running;
        running = false;

        cancelAnimationFrame(
          animationFrame
        );

        startButton.textContent =
          "Start";

        statusElement.textContent =
          "Buffer leeg · wachten op quantumdata…";

        scheduleRetry();

        return;
      }

      const oldX = walker.x;
      const oldY = walker.y;

      walker.x +=
        Math.cos(angle) *
        STEP_LENGTH;

      walker.y +=
        Math.sin(angle) *
        STEP_LENGTH;

      /*
        Reflecterende randen.
      */
      if (walker.x < 0) {
        walker.x = -walker.x;
      }

      if (walker.x > WIDTH) {
        walker.x =
          WIDTH -
          (walker.x - WIDTH);
      }

      if (walker.y < 0) {
        walker.y = -walker.y;
      }

      if (walker.y > HEIGHT) {
        walker.y =
          HEIGHT -
          (walker.y - HEIGHT);
      }

      walker.trail.push({
        x1: oldX,
        y1: oldY,
        x2: walker.x,
        y2: walker.y
      });

      walker.steps++;

      updateInterface();
    }

    function drawArena() {
      context.fillStyle =
        "#010409";

      context.fillRect(
        0,
        0,
        WIDTH,
        HEIGHT
      );

      context.lineWidth = 1.5;
      context.lineCap = "round";

      for (
        let index = 0;
        index < walker.trail.length;
        index++
      ) {
        const segment =
          walker.trail[index];

        const relativeAge =
          index /
          Math.max(
            1,
            walker.trail.length
          );

        const alpha =
          0.2 +
          relativeAge * 0.75;

        context.strokeStyle =
          `rgba(88,166,255,${alpha})`;

        context.beginPath();

        context.moveTo(
          segment.x1,
          segment.y1
        );

        context.lineTo(
          segment.x2,
          segment.y2
        );

        context.stroke();
      }

      context.fillStyle =
        "#f2cc60";

      context.beginPath();

      context.arc(
        walker.x,
        walker.y,
        4.5,
        0,
        Math.PI * 2
      );

      context.fill();
    }

    function animationLoop(timestamp) {
      if (!running) {
        return;
      }

      if (previousFrameTime === 0) {
        previousFrameTime =
          timestamp;
      }

      const elapsed =
        timestamp -
        previousFrameTime;

      previousFrameTime =
        timestamp;

      accumulatedTime +=
        elapsed;

      while (
        accumulatedTime >= STEP_INTERVAL &&
        running
      ) {
        performStep();

        accumulatedTime -=
          STEP_INTERVAL;
      }

      drawArena();

      if (running) {
        animationFrame =
          requestAnimationFrame(
            animationLoop
          );
      }
    }

    function resetWalker() {
      running = false;
      wasRunningBeforeEmpty = false;

      cancelAnimationFrame(
        animationFrame
      );

      walker.x =
        WIDTH / 2;

      walker.y =
        HEIGHT / 2;

      walker.trail = [];
      walker.steps = 0;

      previousFrameTime = 0;
      accumulatedTime = 0;

      startButton.textContent =
        "Start";

      statusElement.textContent =
        quantumBuffer.length > 0
          ? "Quantumdata gereed"
          : "Quantumdata laden…";

      updateInterface();
      drawArena();
      checkBuffer();
    }

    async function startWalk() {
      if (running) {
        return;
      }

      if (quantumBuffer.length === 0) {
        const success =
          await fetchQuantumBatch(false);

        if (
          !success &&
          quantumBuffer.length === 0
        ) {
          scheduleRetry();
          return;
        }
      }

      if (quantumBuffer.length === 0) {
        return;
      }

      running = true;
      wasRunningBeforeEmpty = false;

      startButton.textContent =
        "Pauzeer";

      statusElement.textContent =
        "Quantum walk actief";

      previousFrameTime = 0;

      animationFrame =
        requestAnimationFrame(
          animationLoop
        );
    }

    startButton.addEventListener(
      "click",
      async () => {
        if (running) {
          running = false;
          wasRunningBeforeEmpty = false;

          cancelAnimationFrame(
            animationFrame
          );

          startButton.textContent =
            "Start";

          statusElement.textContent =
            "Gepauzeerd";

          return;
        }

        await startWalk();
      }
    );

    restartButton.addEventListener(
      "click",
      async () => {
        resetWalker();
        await startWalk();
      }
    );

    /*
      Elke vijf seconden controleren of
      prefetch nodig is.
    */
    setInterval(
      checkBuffer,
      5_000
    );

    async function initialize() {
      resetWalker();

      const success =
        await fetchQuantumBatch(true);

      if (
        success &&
        quantumBuffer.length > 0
      ) {
        statusElement.textContent =
          "Quantumdata gereed";
      }
    }

    initialize();
  </script>
</body>
</html>
