<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quantum Random Walk</title>

  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d1117;
      color: #f0f6fc;
    }

    .app {
      width: min(92vw, 780px);
      display: grid;
      gap: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      color: white;
      background: #238636;
    }

    button.secondary {
      background: #30363d;
    }

    .status {
      margin-left: auto;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #010409;
      border: 1px solid #484f58;
      border-radius: 12px;
    }

    .info {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      font-size: 0.85rem;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <main class="app">

    <div class="toolbar">
      <button id="startButton">Start</button>
      <button id="restartButton" class="secondary">Herstart</button>

      <span id="status" class="status">
        Quantumdata laden…
      </span>
    </div>

    <canvas
      id="arena"
      width="720"
      height="720"
    ></canvas>

    <div class="info">
      <span id="bufferInfo">Buffer: 0</span>
      <span id="stepInfo">Stappen: 0</span>
    </div>

  </main>

  <script>
    "use strict";

    const QRNG_URL =
      "https://qrng.anu.edu.au/API/jsonI.php" +
      "?length=1024&type=uint16";

    const MIN_REQUEST_INTERVAL = 60_000;
    const RETRY_INTERVAL = 30_000;

    /*
      Nieuwe batch aanvragen zodra minder dan
      300 getallen over zijn.
    */
    const PREFETCH_THRESHOLD = 300;

    const STEPS_PER_SECOND = 10;
    const STEP_INTERVAL = 1000 / STEPS_PER_SECOND;
    const STEP_LENGTH = 10;

    const canvas =
      document.getElementById("arena");

    const context =
      canvas.getContext("2d");

    const startButton =
      document.getElementById("startButton");

    const restartButton =
      document.getElementById("restartButton");

    const statusElement =
      document.getElementById("status");

    const bufferInfo =
      document.getElementById("bufferInfo");

    const stepInfo =
      document.getElementById("stepInfo");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    const walker = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      trail: [],
      steps: 0
    };

    let running = false;
    let quantumBuffer = [];

    let requestBusy = false;
    let lastRequestAttempt = 0;
    let lastSuccessfulRequest = 0;
    let retryTimer = null;

    let animationFrame = null;
    let previousFrameTime = 0;
    let accumulatedTime = 0;

    function updateInterface() {
      bufferInfo.textContent =
        `Buffer: ${quantumBuffer.length}`;

      stepInfo.textContent =
        `Stappen: ${walker.steps}`;
    }

    function scheduleRetry() {
      clearTimeout(retryTimer);

      retryTimer = setTimeout(() => {
        fetchQuantumBatch(true);
      }, RETRY_INTERVAL);
    }

    async function fetchQuantumBatch(forceRetry = false) {
      const now = Date.now();

      if (requestBusy) {
        return false;
      }

      /*
        Na een succesvol request maximaal één
        nieuw request per minuut.
      */
      if (
        !forceRetry &&
        lastSuccessfulRequest > 0 &&
        now - lastSuccessfulRequest < MIN_REQUEST_INTERVAL
      ) {
        return false;
      }

      /*
        Voorkom snelle herhaalde foutrequests.
      */
      if (
        forceRetry &&
        lastRequestAttempt > 0 &&
        now - lastRequestAttempt < RETRY_INTERVAL
      ) {
        return false;
      }

      requestBusy = true;
      lastRequestAttempt = now;

      statusElement.textContent =
        "Quantumdata ophalen…";

      try {
        const response = await fetch(
          QRNG_URL,
          {
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error(
            `HTTP-fout ${response.status}`
          );
        }

        const result =
          await response.json();

        if (
          result.success !== true ||
          !Array.isArray(result.data) ||
          result.data.length === 0
        ) {
          throw new Error(
            "Ongeldig QRNG-antwoord"
          );
        }

        quantumBuffer.push(...result.data);

        lastSuccessfulRequest = Date.now();

        clearTimeout(retryTimer);

        statusElement.textContent =
          running
            ? "Quantum walk actief"
            : "Quantumdata gereed";

        updateInterface();

        return true;

      } catch (error) {
        console.error(error);

        statusElement.textContent =
          quantumBuffer.length > 0
            ? "QRNG-fout · buffer nog actief"
            : "QRNG-fout · opnieuw proberen…";

        scheduleRetry();

        return false;

      } finally {
        requestBusy = false;
      }
    }

    function checkBuffer() {
      /*
        Al ruim voor een lege buffer
        een nieuw request voorbereiden.
      */
      if (
        quantumBuffer.length <= PREFETCH_THRESHOLD &&
        !requestBusy
      ) {
        fetchQuantumBatch();
      }

      /*
        Is de buffer echt leeg, probeer dan
        direct opnieuw, onafhankelijk van de walk.
      */
      if (
        quantumBuffer.length === 0 &&
        !requestBusy
      ) {
        fetchQuantumBatch(true);
      }
    }

    function getQuantumDirection() {
      checkBuffer();

      if (quantumBuffer.length === 0) {
        return null;
      }

      const value =
        quantumBuffer.shift();

      updateInterface();
      checkBuffer();

      return (
        value / 65536
      ) * Math.PI * 2;
    }

    function performStep() {
      const angle =
        getQuantumDirection();

      if (angle === null) {
        running = false;

        startButton.textContent =
          "Start";

        statusElement.textContent =
          "Buffer leeg · quantumdata ophalen…";

        fetchQuantumBatch(true);

        return;
      }

      const oldX = walker.x;
      const oldY = walker.y;

      walker.x +=
        Math.cos(angle) *
        STEP_LENGTH;

      walker.y +=
        Math.sin(angle) *
        STEP_LENGTH;

      if (walker.x < 0) {
        walker.x = -walker.x;
      }

      if (walker.x > WIDTH) {
        walker.x =
          WIDTH - (walker.x - WIDTH);
      }

      if (walker.y < 0) {
        walker.y = -walker.y;
      }

      if (walker.y > HEIGHT) {
        walker.y =
          HEIGHT - (walker.y - HEIGHT);
      }

      walker.trail.push({
        x1: oldX,
        y1: oldY,
        x2: walker.x,
        y2: walker.y
      });

      walker.steps++;

      updateInterface();
    }

    function drawArena() {
      context.fillStyle = "#010409";

      context.fillRect(
        0,
        0,
        WIDTH,
        HEIGHT
      );

      context.lineWidth = 1.5;
      context.lineCap = "round";

      for (
        let index = 0;
        index < walker.trail.length;
        index++
      ) {
        const segment =
          walker.trail[index];

        const relativeAge =
          index /
          Math.max(
            1,
            walker.trail.length
          );

        const alpha =
          0.2 +
          relativeAge * 0.75;

        context.strokeStyle =
          `rgba(88,166,255,${alpha})`;

        context.beginPath();

        context.moveTo(
          segment.x1,
          segment.y1
        );

        context.lineTo(
          segment.x2,
          segment.y2
        );

        context.stroke();
      }

      context.fillStyle =
        "#f2cc60";

      context.beginPath();

      context.arc(
        walker.x,
        walker.y,
        4.5,
        0,
        Math.PI * 2
      );

      context.fill();
    }

    function animationLoop(timestamp) {
      if (!running) {
        return;
      }

      if (previousFrameTime === 0) {
        previousFrameTime =
          timestamp;
      }

      const elapsed =
        timestamp -
        previousFrameTime;

      previousFrameTime =
        timestamp;

      accumulatedTime +=
        elapsed;

      while (
        accumulatedTime >= STEP_INTERVAL &&
        running
      ) {
        performStep();

        accumulatedTime -=
          STEP_INTERVAL;
      }

      drawArena();

      if (running) {
        animationFrame =
          requestAnimationFrame(
            animationLoop
          );
      }
    }

    function resetWalker() {
      running = false;

      cancelAnimationFrame(
        animationFrame
      );

      walker.x =
        WIDTH / 2;

      walker.y =
        HEIGHT / 2;

      walker.trail = [];
      walker.steps = 0;

      previousFrameTime = 0;
      accumulatedTime = 0;

      startButton.textContent =
        "Start";

      statusElement.textContent =
        quantumBuffer.length > 0
          ? "Quantumdata gereed"
          : "Quantumdata laden…";

      updateInterface();
      drawArena();
      checkBuffer();
    }

    async function startWalk() {
      if (quantumBuffer.length === 0) {
        await fetchQuantumBatch(true);
      }

      if (quantumBuffer.length === 0) {
        return;
      }

      running = true;

      startButton.textContent =
        "Pauzeer";

      statusElement.textContent =
        "Quantum walk actief";

      previousFrameTime = 0;

      animationFrame =
        requestAnimationFrame(
          animationLoop
        );
    }

    startButton.addEventListener(
      "click",
      async () => {
        if (running) {
          running = false;

          cancelAnimationFrame(
            animationFrame
          );

          startButton.textContent =
            "Start";

          statusElement.textContent =
            "Gepauzeerd";

          return;
        }

        await startWalk();
      }
    );

    restartButton.addEventListener(
      "click",
      async () => {
        resetWalker();
        await startWalk();
      }
    );

    /*
      Extra periodieke controle.
    */
    setInterval(
      checkBuffer,
      5_000
    );

    async function initialize() {
      resetWalker();
      await fetchQuantumBatch(true);
    }

    initialize();
  </script>
</body>
</html>
