<body>
  <main class="app">

    <section id="choiceScreen" class="choice-screen">
      <div class="choice-panel">

        <div class="choice-buttons">

          <button
            id="chooseWalkButton"
            class="choice-button"

          >

          <button

            class="choice-button"

          >

            <strong>Knikkerwaterval</strong>
            <small>Quantum-random links/rechts</small>
          </button>

        </div>

        <span id="choiceStatus">

    </section>

    <section id="experimentScreen" hidden>

      <div class="toolbar">

        <button id="startButton" type="button">

        </span>

      <canvas
        id="arena"
        width="720"
        height="720"
      ></canvas>

      <div class="info">
        <span id="modeInfo">Modus: —</span>
        <span id="bufferInfo">Buffer: 0</span>
        <span id="counterInfo">Aantal: 0</span>
        <span id="requestInfo">Nog geen batch</span>
        <span>Versie 1.3.1</span>
      </div>

    </section>

  </main>

  <script>
    "use strict";

    const VERSION = "1.3.1";

    const QRNG_URL =
      "https://qrng.anu.edu.au/API/jsonI.php" +
      "?length=1024&type=uint16";

    const MIN_REQUEST_INTERVAL = 60_000;
    const RETRY_INTERVAL = 90_000;
    const PREFETCH_THRESHOLD = 600;

    const WALK_STEPS_PER_SECOND = 10;
    const WALK_STEP_INTERVAL =
      1000 / WALK_STEPS_PER_SECOND;

    const WALK_STEP_LENGTH = 10;

    const BALL_SPAWN_INTERVAL = 700;
    const BALL_SPEED = 3.2;
    const BALL_RADIUS = 5;

    const PEG_ROWS = 11;
    const PEG_HORIZONTAL_SPACING = 48;
    const PEG_VERTICAL_SPACING = 43;
    const PEG_RADIUS = 4;

    const choiceScreen =
      document.getElementById("choiceScreen");

    const experimentScreen =
      document.getElementById("experimentScreen");

    const chooseWalkButton =
      document.getElementById("chooseWalkButton");

    const chooseWaterfallButton =
      document.getElementById(
        "chooseWaterfallButton"
      );

    const choiceStatus =
      document.getElementById("choiceStatus");

    const startButton =
      document.getElementById("startButton");

    const restartButton =
      document.getElementById("restartButton");

    const menuButton =
      document.getElementById("menuButton");

    const statusElement =
      document.getElementById("status");

    const modeInfo =
      document.getElementById("modeInfo");

    const bufferInfo =
      document.getElementById("bufferInfo");

    const counterInfo =
      document.getElementById("counterInfo");

    const requestInfo =
      document.getElementById("requestInfo");

    const canvas =
      document.getElementById("arena");

    const context =
      canvas.getContext("2d");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    let currentMode = null;
    let running = false;
    let wasRunningBeforeEmpty = false;

    let quantumBuffer = [];

    let requestBusy = false;
    let lastRequestAttempt = 0;
    let lastSuccessfulRequest = 0;
    let retryTimer = null;

    let animationFrame = null;
    let previousFrameTime = 0;
    let accumulatedTime = 0;
    let ballSpawnAccumulator = 0;

    const walker = {
      x: WIDTH / 2,
      y: HEIGHT / 2,
      trail: [],
      steps: 0
    };

    const waterfall = {
      balls: [],
      pegs: [],
      bins: [],
      completedBalls: 0
    };

    function showMenu() {
      running = false;
      currentMode = null;

      cancelAnimationFrame(animationFrame);

      experimentScreen.hidden = true;
      choiceScreen.hidden = false;

      startButton.textContent = "Start";

      updateInterface();
    }

    function showExperiment(mode) {
      currentMode = mode;

      choiceScreen.hidden = true;
      experimentScreen.hidden = false;

      modeInfo.textContent =
        mode === "walk"
          ? "Modus: Random Walk"
          : "Modus: Knikkerwaterval";

      resetCurrentExperiment();
    }

    function updateInterface() {
      bufferInfo.textContent =
        `Buffer: ${quantumBuffer.length}`;

      if (currentMode === "walk") {
        counterInfo.textContent =
          `Stappen: ${walker.steps}`;
      } else if (currentMode === "waterfall") {
        counterInfo.textContent =
          `Knikkers: ${waterfall.completedBalls}`;
      } else {
        counterInfo.textContent = "Aantal: 0";
      }

      if (lastSuccessfulRequest > 0) {
        requestInfo.textContent =
          `Laatste batch: ${
            new Date(
              lastSuccessfulRequest
            ).toLocaleTimeString()
          }`;
      }

      if (requestBusy) {
        choiceStatus.textContent =
          "Quantumdata ophalen…";
      } else if (quantumBuffer.length > 0) {
        choiceStatus.textContent =
          `Quantumdata gereed · buffer ${
            quantumBuffer.length
          }`;
      } else {
        choiceStatus.textContent =
          "Wachten op quantumdata…";
      }
    }

    function scheduleRetry() {
      clearTimeout(retryTimer);

      retryTimer = setTimeout(async () => {
        retryTimer = null;

        const success =
          await fetchQuantumBatch(true);

        if (!success) {
          scheduleRetry();
        }
      }, RETRY_INTERVAL);
    }

    async function fetchQuantumBatch(
      forceRetry = false
    ) {
      const now = Date.now();

      if (requestBusy) {
        return false;
      }

      if (
        !forceRetry &&
        lastSuccessfulRequest > 0 &&
        now - lastSuccessfulRequest <
          MIN_REQUEST_INTERVAL
      ) {
        return false;
      }

      if (
        forceRetry &&
        lastRequestAttempt > 0 &&
        now - lastRequestAttempt <
          RETRY_INTERVAL
      ) {
        return false;
      }

      requestBusy = true;
      lastRequestAttempt = now;

      statusElement.textContent =
        "Quantumdata ophalen…";

      updateInterface();

      try {
        const response = await fetch(
          `${QRNG_URL}&timestamp=${Date.now()}`,
          {
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error(
            `HTTP-fout ${response.status}`
          );
        }

        const result =
          await response.json();

        if (
          result.success !== true ||
          !Array.isArray(result.data) ||
          result.data.length === 0
        ) {
          throw new Error(
            "Ongeldig QRNG-antwoord"
          );
        }

        quantumBuffer.push(...result.data);

        lastSuccessfulRequest = Date.now();

        clearTimeout(retryTimer);
        retryTimer = null;

        statusElement.textContent =
          running
            ? "Experiment actief"
            : "Quantumdata gereed";

        updateInterface();

        if (
          wasRunningBeforeEmpty &&
          !running &&
          currentMode
        ) {
          wasRunningBeforeEmpty = false;
          startExperiment();
        }

        return true;

      } catch (error) {
        console.error(
          "QRNG-request mislukt:",
          error
        );

        statusElement.textContent =
          quantumBuffer.length > 0
            ? "QRNG-fout · buffer actief"
            : "QRNG-fout · retry gepland";

        scheduleRetry();
        return false;

      } finally {
        requestBusy = false;
        updateInterface();
      }
    }

    function checkBuffer() {
      if (
        quantumBuffer.length <=
          PREFETCH_THRESHOLD &&
        !requestBusy
      ) {
        fetchQuantumBatch(false);
      }

      if (
        quantumBuffer.length === 0 &&
        !requestBusy &&
        retryTimer === null
      ) {
        scheduleRetry();
      }
    }

    function takeQuantumNumber() {
      checkBuffer();

      if (quantumBuffer.length === 0) {
        return null;
      }

      const value = quantumBuffer.shift();

      updateInterface();
      checkBuffer();

      return value;
    }

    function stopForEmptyBuffer() {
      wasRunningBeforeEmpty = running;
      running = false;

      cancelAnimationFrame(animationFrame);

      startButton.textContent = "Start";

      statusElement.textContent =
        "Buffer leeg · wachten op quantumdata…";

      scheduleRetry();
    }

    function resetWalk() {
      walker.x = WIDTH / 2;
      walker.y = HEIGHT / 2;
      walker.trail = [];
      walker.steps = 0;
    }

    function performWalkStep() {
      const quantumValue =
        takeQuantumNumber();

      if (quantumValue === null) {
        stopForEmptyBuffer();
        return;
      }

      const angle =
        quantumValue / 65536 *
        Math.PI * 2;

      const oldX = walker.x;
      const oldY = walker.y;

      walker.x +=
        Math.cos(angle) *
        WALK_STEP_LENGTH;

      walker.y +=
        Math.sin(angle) *
        WALK_STEP_LENGTH;

      if (walker.x < 0) {
        walker.x = -walker.x;
      }

      if (walker.x > WIDTH) {
        walker.x =
          WIDTH -
          (walker.x - WIDTH);
      }

      if (walker.y < 0) {
        walker.y = -walker.y;
      }

      if (walker.y > HEIGHT) {
        walker.y =
          HEIGHT -
          (walker.y - HEIGHT);
      }

      walker.trail.push({
        x1: oldX,
        y1: oldY,
        x2: walker.x,
        y2: walker.y
      });

      walker.steps++;
      updateInterface();
    }

    function drawWalk() {
      context.fillStyle = "#010409";
      context.fillRect(
        0,
        0,
        WIDTH,
        HEIGHT
      );

      context.lineWidth = 1.5;
      context.lineCap = "round";

      for (
        let index = 0;
        index < walker.trail.length;
        index++
      ) {
        const segment =
          walker.trail[index];

        const relativeAge =
          index /
          Math.max(
            1,
            walker.trail.length
          );

        const alpha =
          0.2 +
          relativeAge * 0.75;

        context.strokeStyle =
          `rgba(88,166,255,${alpha})`;

        context.beginPath();

        context.moveTo(
          segment.x1,
          segment.y1
        );

        context.lineTo(
          segment.x2,
          segment.y2
        );

        context.stroke();
      }

      context.fillStyle = "#f2cc60";
      context.beginPath();

      context.arc(
        walker.x,
        walker.y,
        4.5,
        0,
        Math.PI * 2
      );

      context.fill();
    }

    function buildWaterfall() {
      waterfall.pegs = [];
      waterfall.balls = [];
      waterfall.completedBalls = 0;

      const startY = 85;

      for (
        let row = 0;
        row < PEG_ROWS;
        row++
      ) {
        const pegsInRow = row + 1;

        const rowWidth =
          (pegsInRow - 1) *
          PEG_HORIZONTAL_SPACING;

        const startX =
          WIDTH / 2 -
          rowWidth / 2;

        for (
          let column = 0;
          column < pegsInRow;
          column++
        ) {
          waterfall.pegs.push({
            x:
              startX +
              column *
              PEG_HORIZONTAL_SPACING,
            y:
              startY +
              row *
              PEG_VERTICAL_SPACING
          });
        }
      }

      waterfall.bins =
        new Array(PEG_ROWS + 1)
          .fill(0);
    }

    function spawnBall() {
      waterfall.balls.push({
        x: WIDTH / 2,
        y: 30,
        vy: BALL_SPEED,
        row: 0,
        choices: 0
      });
    }

    function updateBall(ball) {
      ball.y += ball.vy;

      if (ball.row < PEG_ROWS) {
        const pegY =
          85 +
          ball.row *
          PEG_VERTICAL_SPACING;

        if (ball.y >= pegY) {
          const quantumValue =
            takeQuantumNumber();

          if (quantumValue === null) {
            stopForEmptyBuffer();
            return true;
          }

          const goRight =
            quantumValue % 2 === 1;

          ball.x +=
            goRight
              ? PEG_HORIZONTAL_SPACING / 2
              : -PEG_HORIZONTAL_SPACING / 2;

          if (goRight) {
            ball.choices++;
          }

          ball.row++;
        }
      }

      const binsTop =
        85 +
        PEG_ROWS *
        PEG_VERTICAL_SPACING +
        18;

      if (ball.y >= binsTop) {
        const binIndex =
          Math.max(
            0,
            Math.min(
              waterfall.bins.length - 1,
              ball.choices
            )
          );

        waterfall.bins[binIndex]++;
        waterfall.completedBalls++;

        updateInterface();
        return false;
      }

      return true;
    }

    function updateWaterfall(elapsed) {
      ballSpawnAccumulator += elapsed;

      while (
        ballSpawnAccumulator >=
          BALL_SPAWN_INTERVAL &&
        running
      ) {
        spawnBall();

        ballSpawnAccumulator -=
          BALL_SPAWN_INTERVAL;
      }

      waterfall.balls =
        waterfall.balls.filter(updateBall);
    }

    function drawWaterfall() {
      context.fillStyle = "#010409";
      context.fillRect(
        0,
        0,
        WIDTH,
        HEIGHT
      );

      context.fillStyle = "#8b949e";

      for (const peg of waterfall.pegs) {
        context.beginPath();

        context.arc(
          peg.x,
          peg.y,
          PEG_RADIUS,
          0,
          Math.PI * 2
        );

        context.fill();
      }

      context.fillStyle = "#58a6ff";

      for (const ball of waterfall.balls) {
        context.beginPath();

        context.arc(
          ball.x,
          ball.y,
          BALL_RADIUS,
          0,
          Math.PI * 2
        );

        context.fill();
      }

      const binsTop =
        85 +
        PEG_ROWS *
        PEG_VERTICAL_SPACING +
        18;

      const binWidth =
        WIDTH /
        waterfall.bins.length;

      const maximum =
        Math.max(
          1,
          ...waterfall.bins
        );

      context.font =
        "13px system-ui";

      context.textAlign =
        "center";

      for (
        let index = 0;
        index < waterfall.bins.length;
        index++
      ) {
        const count =
          waterfall.bins[index];

        const x =
          index * binWidth;

        const maximumBarHeight =
          HEIGHT - binsTop - 42;

        const barHeight =
          count / maximum *
          maximumBarHeight;

        context.strokeStyle =
          "#484f58";

        context.strokeRect(
          x,
          binsTop,
          binWidth,
          HEIGHT - binsTop - 30
        );

        context.fillStyle =
          "rgba(88,166,255,0.6)";

        context.fillRect(
          x + 2,
          HEIGHT - 32 - barHeight,
          binWidth - 4,
          barHeight
        );

        context.fillStyle =
          "#f0f6fc";

        context.fillText(
          String(count),
          x + binWidth / 2,
          HEIGHT - 10
        );
      }
    }

    function drawCurrentMode() {
      if (currentMode === "walk") {
        drawWalk();
      } else if (
        currentMode === "waterfall"
      ) {
        drawWaterfall();
      }
    }

    function animationLoop(timestamp) {
      if (!running) {
        return;
      }

      if (previousFrameTime === 0) {
        previousFrameTime = timestamp;
      }

      const elapsed =
        Math.min(
          100,
          timestamp -
          previousFrameTime
        );

      previousFrameTime = timestamp;

      if (currentMode === "walk") {
        accumulatedTime += elapsed;

        while (
          accumulatedTime >=
            WALK_STEP_INTERVAL &&
          running
        ) {
          performWalkStep();

          accumulatedTime -=
            WALK_STEP_INTERVAL;
        }
      } else if (
        currentMode === "waterfall"
      ) {
        updateWaterfall(elapsed);
      }

      drawCurrentMode();

      if (running) {
        animationFrame =
          requestAnimationFrame(
            animationLoop
          );
      }
    }

    function resetCurrentExperiment() {
      running = false;
      wasRunningBeforeEmpty = false;

      cancelAnimationFrame(animationFrame);

      previousFrameTime = 0;
      accumulatedTime = 0;
      ballSpawnAccumulator = 0;

      startButton.textContent = "Start";

      if (currentMode === "walk") {
        resetWalk();
      } else if (
        currentMode === "waterfall"
      ) {
        buildWaterfall();
      }

      statusElement.textContent =
        quantumBuffer.length > 0
          ? "Quantumdata gereed"
          : "Quantumdata laden…";

      updateInterface();
      drawCurrentMode();
      checkBuffer();
    }

    async function startExperiment() {
      if (running || !currentMode) {
        return;
      }

      if (quantumBuffer.length === 0) {
        const success =
          await fetchQuantumBatch(false);

        if (
          !success &&
          quantumBuffer.length === 0
        ) {
          scheduleRetry();
          return;
        }
      }

      running = true;
      wasRunningBeforeEmpty = false;

      startButton.textContent =
        "Pauzeer";

      statusElement.textContent =
        "Experiment actief";

      previousFrameTime = 0;

      animationFrame =
        requestAnimationFrame(
          animationLoop
        );
    }

    chooseWalkButton.addEventListener(
      "click",
      () => showExperiment("walk")
    );

    chooseWaterfallButton.addEventListener(
      "click",
      () => showExperiment("waterfall")
    );

    startButton.addEventListener(
      "click",
      async () => {
        if (running) {
          running = false;
          wasRunningBeforeEmpty = false;

          cancelAnimationFrame(
            animationFrame
          );

          startButton.textContent =
            "Start";

          statusElement.textContent =
            "Gepauzeerd";

          return;
        }

        await startExperiment();
      }
    );

    restartButton.addEventListener(
      "click",
      async () => {
        resetCurrentExperiment();
        await startExperiment();
      }
    );

    menuButton.addEventListener(
      "click",
      showMenu
    );

    setInterval(
      checkBuffer,
      5_000
    );

    async function initialize() {
      /*
        Forceer altijd eerst het menu.
      */
      showMenu();

      resetWalk();
      buildWaterfall();
      updateInterface();

      await fetchQuantumBatch(true);
    }

    window.addEventListener(
      "DOMContentLoaded",
      initialize
    );
  </script>
</body>
</html>
