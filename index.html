<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quantum Memory Walk</title>

  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d1117;
      color: #f0f6fc;
    }

    .app {
      width: min(92vw, 780px);
      display: grid;
      gap: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      color: white;
      background: #238636;
    }

    button.secondary {
      background: #30363d;
    }

    button:hover {
      filter: brightness(1.15);
    }

    .status {
      margin-left: auto;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    canvas {
      width: 100%;
      aspect-ratio: 1;
      display: block;
      background: #010409;
      border: 1px solid #484f58;
      border-radius: 12px;
    }

    .info {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      font-size: 0.85rem;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <main class="app">

    <div class="toolbar">
      <button id="startButton">Start</button>

      <button
        id="restartButton"
        class="secondary"
      >
        Herstart
      </button>

      <span
        id="status"
        class="status"
      >
        Quantumdata laden…
      </span>
    </div>

    <canvas
      id="arena"
      width="720"
      height="720"
    ></canvas>

    <div class="info">
      <span id="bufferInfo">Buffer: 0</span>
      <span id="requestInfo">Nog geen request</span>
    </div>

  </main>

  <script>
    "use strict";

    /*
      Eén request per minuut.

      De API levert maximaal één grote batch van uint16-getallen.
      Elk getal bepaalt een kleine richtingsverandering.
    */

    const QRNG_URL =
      "https://qrng.anu.edu.au/API/jsonI.php" +
      "?length=1024&type=uint16";

    const REQUEST_INTERVAL = 4 * 60_000;

    /*
      1024 getallen per minuut is ongeveer 17 per seconde.

      We gebruiken 15 stappen per seconde, zodat de buffer
      normaal niet vóór het volgende request leeg raakt.
    */

    const STEPS_PER_SECOND = 4;
    const STEP_INTERVAL = 1000 / STEPS_PER_SECOND;

    const canvas =
      document.getElementById("arena");

    const context =
      canvas.getContext("2d");

    const startButton =
      document.getElementById("startButton");

    const restartButton =
      document.getElementById("restartButton");

    const statusElement =
      document.getElementById("status");

    const bufferInfo =
      document.getElementById("bufferInfo");

    const requestInfo =
      document.getElementById("requestInfo");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    const settings = {
      speed: 3,
      quantumTurnStrength: 0.55,

      activeMemory: 1600,
      visibleTrail: 6500,

      memoryRadius: 55,
      memoryStrength: 3.8,
      sampleStride: 5,

      boundaryMargin: 60,
      boundaryStrength: 2.4
    };

    const walker = {
      x: WIDTH / 2,
      y: HEIGHT / 2,

      angle: 0,

      trail: [],

      steps: 0
    };

    let running = false;
    let quantumBuffer = [];

    let requestBusy = false;
    let lastRequestTime = 0;

    let animationFrame = null;
    let previousFrameTime = 0;
    let accumulatedTime = 0;

    function updateInterface() {
      bufferInfo.textContent =
        `Buffer: ${quantumBuffer.length}`;

      if (lastRequestTime > 0) {
        const time =
          new Date(lastRequestTime);

        requestInfo.textContent =
          `Laatste request: ${time.toLocaleTimeString()}`;
      }
    }

    async function fetchQuantumBatch() {
      const now = Date.now();

      /*
        Voorkom meer dan één request per minuut.
      */

      if (requestBusy) {
        return false;
      }

      if (
        lastRequestTime > 0 &&
        now - lastRequestTime < REQUEST_INTERVAL
      ) {
        return false;
      }

      requestBusy = true;
      lastRequestTime = now;

      statusElement.textContent =
        "Quantumdata ophalen…";

      updateInterface();

      try {
        const response = await fetch(
          QRNG_URL,
          {
            method: "GET",
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error(
            `HTTP-fout ${response.status}`
          );
        }

        const result =
          await response.json();

        if (
          result.success !== true ||
          !Array.isArray(result.data)
        ) {
          throw new Error(
            "Ongeldig antwoord van QRNG"
          );
        }

        quantumBuffer.push(
          ...result.data
        );

        statusElement.textContent =
          running
            ? "Quantum walk actief"
            : "Quantumdata gereed";

        updateInterface();

        return true;

      } catch (error) {
        console.error(error);

        statusElement.textContent =
          "QRNG-request geblokkeerd of onbereikbaar";

        return false;

      } finally {
        requestBusy = false;
      }
    }

    function getQuantumValue() {
      if (quantumBuffer.length === 0) {
        return null;
      }

      const value =
        quantumBuffer.shift();

      updateInterface();

      /*
        Zet uint16 om naar een bereik van -1 tot +1.
      */

      return (
        value / 65535
      ) * 2 - 1;
    }

    function normalizeAngleDifference(
      target,
      current
    ) {
      let difference =
        target - current;

      while (difference > Math.PI) {
        difference -= Math.PI * 2;
      }

      while (difference < -Math.PI) {
        difference += Math.PI * 2;
      }

      return difference;
    }

    function calculateMemoryForce() {
      let forceX = 0;
      let forceY = 0;
      let totalWeight = 0;

      const startIndex =
        Math.max(
          0,
          walker.trail.length -
          settings.activeMemory
        );

      for (
        let index = startIndex;
        index < walker.trail.length;
        index += settings.sampleStride
      ) {
        const point =
          walker.trail[index];

        const deltaX =
          walker.x - point.x;

        const deltaY =
          walker.y - point.y;

        const distanceSquared =
          deltaX * deltaX +
          deltaY * deltaY;

        if (distanceSquared < 9) {
          continue;
        }

        if (
          distanceSquared >
          settings.memoryRadius *
          settings.memoryRadius
        ) {
          continue;
        }

        const distance =
          Math.sqrt(distanceSquared);

        const age =
          walker.trail.length - index;

        const ageWeight =
          Math.exp(-age / 500);

        const distanceWeight =
          Math.exp(-distance / 22);

        /*
          Golfachtige aantrekking en afstoting
          tot het historische pad.
        */

        const wave =
          Math.sin(
            distance * 0.32 -
            age * 0.075
          );

        const weight =
          ageWeight *
          distanceWeight *
          wave;

        forceX +=
          deltaX / distance * weight;

        forceY +=
          deltaY / distance * weight;

        totalWeight +=
          Math.abs(weight);
      }

      if (totalWeight === 0) {
        return 0;
      }

      const targetAngle =
        Math.atan2(
          forceY,
          forceX
        );

      return (
        normalizeAngleDifference(
          targetAngle,
          walker.angle
        ) *
        settings.memoryStrength
      );
    }

    function calculateBoundaryForce() {
      let forceX = 0;
      let forceY = 0;

      const margin =
        settings.boundaryMargin;

      if (walker.x < margin) {
        forceX +=
          (margin - walker.x) /
          margin;
      }

      if (walker.x > WIDTH - margin) {
        forceX -=
          (
            walker.x -
            (WIDTH - margin)
          ) / margin;
      }

      if (walker.y < margin) {
        forceY +=
          (margin - walker.y) /
          margin;
      }

      if (walker.y > HEIGHT - margin) {
        forceY -=
          (
            walker.y -
            (HEIGHT - margin)
          ) / margin;
      }

      if (
        forceX === 0 &&
        forceY === 0
      ) {
        return 0;
      }

      const targetAngle =
        Math.atan2(
          forceY,
          forceX
        );

      return (
        normalizeAngleDifference(
          targetAngle,
          walker.angle
        ) *
        settings.boundaryStrength
      );
    }

    function performStep() {
      const quantumValue =
        getQuantumValue();

      if (quantumValue === null) {
        running = false;

        startButton.textContent =
          "Start";

        statusElement.textContent =
          "Quantum-buffer leeg";

        return;
      }

      const quantumTurn =
        quantumValue *
        settings.quantumTurnStrength;

      const memoryTurn =
        calculateMemoryForce();

      const boundaryTurn =
        calculateBoundaryForce();

      walker.angle +=
        quantumTurn +
        memoryTurn * 0.08 +
        boundaryTurn * 0.12;

      walker.x +=
        Math.cos(walker.angle) *
        settings.speed;

      walker.y +=
        Math.sin(walker.angle) *
        settings.speed;

      /*
        Reflectie wanneer het pad toch de rand raakt.
      */

      if (
        walker.x <= 0 ||
        walker.x >= WIDTH
      ) {
        walker.angle =
          Math.PI - walker.angle;

        walker.x =
          Math.max(
            0,
            Math.min(WIDTH, walker.x)
          );
      }

      if (
        walker.y <= 0 ||
        walker.y >= HEIGHT
      ) {
        walker.angle =
          -walker.angle;

        walker.y =
          Math.max(
            0,
            Math.min(HEIGHT, walker.y)
          );
      }

      walker.trail.push({
        x: walker.x,
        y: walker.y
      });

      walker.steps++;

      if (
        walker.trail.length >
        settings.visibleTrail
      ) {
        walker.trail.splice(
          0,
          walker.trail.length -
          settings.visibleTrail
        );
      }
    }

    function drawArena() {
      context.fillStyle =
        "#010409";

      context.fillRect(
        0,
        0,
        WIDTH,
        HEIGHT
      );

      /*
        Historisch pad.

        Oudere delen blijven zichtbaar,
        nieuwere delen worden helderder.
      */

      if (walker.trail.length > 1) {
        context.lineWidth = 1.6;
        context.lineCap = "round";
        context.lineJoin = "round";

        const segmentSize = 200;

        for (
          let start = 1;
          start < walker.trail.length;
          start += segmentSize
        ) {
          const end =
            Math.min(
              walker.trail.length,
              start + segmentSize
            );

          const relativeAge =
            end /
            walker.trail.length;

          const alpha =
            0.28 +
            relativeAge * 0.7;

          context.strokeStyle =
            `rgba(88,166,255,${alpha})`;

          context.beginPath();

          context.moveTo(
            walker.trail[start - 1].x,
            walker.trail[start - 1].y
          );

          for (
            let index = start;
            index < end;
            index++
          ) {
            context.lineTo(
              walker.trail[index].x,
              walker.trail[index].y
            );
          }

          context.stroke();
        }
      }

      /*
        Huidige walker.
      */

      context.fillStyle =
        "#f2cc60";

      context.beginPath();

      context.arc(
        walker.x,
        walker.y,
        4.5,
        0,
        Math.PI * 2
      );

      context.fill();
    }

    function animationLoop(timestamp) {
      if (!running) {
        return;
      }

      if (previousFrameTime === 0) {
        previousFrameTime = timestamp;
      }

      const elapsed =
        timestamp - previousFrameTime;

      previousFrameTime = timestamp;
      accumulatedTime += elapsed;

      while (
        accumulatedTime >= STEP_INTERVAL &&
        running
      ) {
        performStep();

        accumulatedTime -=
          STEP_INTERVAL;
      }

      drawArena();

      animationFrame =
        requestAnimationFrame(
          animationLoop
        );
    }

    function resetWalker() {
      running = false;

      cancelAnimationFrame(
        animationFrame
      );

      walker.x =
        WIDTH / 2;

      walker.y =
        HEIGHT / 2;

      walker.angle =
        quantumBuffer.length > 0
          ? (
              quantumBuffer[0] /
              65535
            ) * Math.PI * 2
          : 0;

      walker.trail = [
        {
          x: walker.x,
          y: walker.y
        }
      ];

      walker.steps = 0;

      previousFrameTime = 0;
      accumulatedTime = 0;

      startButton.textContent =
        "Start";

      statusElement.textContent =
        quantumBuffer.length > 0
          ? "Gereed"
          : "Quantumdata laden…";

      drawArena();
    }

    async function startWalk() {
      if (quantumBuffer.length === 0) {
        await fetchQuantumBatch();
      }

      if (quantumBuffer.length === 0) {
        return;
      }

      running = true;

      startButton.textContent =
        "Pauzeer";

      statusElement.textContent =
        "Quantum walk actief";

      previousFrameTime = 0;

      animationFrame =
        requestAnimationFrame(
          animationLoop
        );
    }

    startButton.addEventListener(
      "click",
      async () => {
        if (running) {
          running = false;

          cancelAnimationFrame(
            animationFrame
          );

          startButton.textContent =
            "Start";

          statusElement.textContent =
            "Gepauzeerd";

          return;
        }

        await startWalk();
      }
    );

    restartButton.addEventListener(
      "click",
      async () => {
        resetWalker();

        if (quantumBuffer.length === 0) {
          await fetchQuantumBatch();
        }

        await startWalk();
      }
    );

    /*
      Automatisch maximaal één request per minuut.
    */

    setInterval(
      () => {
        fetchQuantumBatch();
      },
      REQUEST_INTERVAL
    );

    /*
      Eerste batch ophalen.
    */

    async function initialize() {
      resetWalker();

      await fetchQuantumBatch();

      if (quantumBuffer.length > 0) {
        statusElement.textContent =
          "Quantumdata gereed";
      }
    }

    initialize();
  </script>
</body>
</html>
